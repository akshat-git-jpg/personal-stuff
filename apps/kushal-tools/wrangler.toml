name = "kushal-tools"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# No assets binding: the hub + login pages are rendered by the Worker so the
# PIN gate can protect the page itself (a static asset would be served before
# the Worker auth runs).

[vars]
# Secrets (set with `npx wrangler secret put <NAME>`, and mirror in .dev.vars for local):
#   APP_PASSWORD    — the shared password for the gate
#   SESSION_SECRET  — random string used to sign the auth cookie

# Custom domain (Cloudflare auto-provisions DNS + SSL on the agrolloo.com zone)
[[routes]]
pattern = "kushal-tools.agrolloo.com"
custom_domain = true
