<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tutorial VO</title>
<style>
  :root { --bg: #111; --card: #222; --text: #eee; --muted: #aaa; --border: #333; --accent: #09f; --accent-hover: #08e; --danger: #e33; --success: #2a2; }
  body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 16px; padding-bottom: 64px; }
  header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  h1 { margin: 0; font-size: 20px; }
  .stats { color: var(--muted); font-size: 14px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; height: 40px; padding: 0 16px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; background: var(--border); color: var(--text); text-decoration: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 12px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; }
  .chip { font-size: 12px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: #333; }
  .chip-demo { background: var(--accent); color: white; }
  .chip-locked { background: var(--success); color: white; }
  
  .display-text { font-size: 16px; line-height: 1.5; white-space: pre-wrap; }
  .notes { font-size: 14px; color: #fbbf24; border-left: 3px solid #fbbf24; padding-left: 8px; }
  
  .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .takes { font-size: 14px; color: var(--muted); margin-right: auto; }
  
  .respell-form { display: none; flex-direction: column; gap: 8px; margin-top: 8px; }
  .respell-form.open { display: flex; }
  textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 8px; font-family: inherit; resize: vertical; min-height: 80px; }
  
  .status { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .error { color: var(--danger); }
  audio { width: 100%; height: 40px; margin-top: 8px; }
  
  .footer-msg { font-size: 12px; text-align: center; color: var(--muted); font-weight: bold; padding: 8px; background: #1a1a1a; border-radius: 4px; }
</style>
</head>
<body>

<div id="app">Loading...</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('t');
const slug = window.location.pathname.split('/').pop();

let state = null;

async function fetchState() {
  const res = await fetch(`/api/video/${slug}?t=${token}`);
  if (!res.ok) {
    document.getElementById('app').innerHTML = `<div class="error">Failed to load: ${res.status}</div>`;
    return;
  }
  state = await res.json();
  render();
}

function render() {
  if (!state) return;
  const lockedCount = state.sections.filter(s => s.locked === 1).length;
  
  let html = `
    <header>
      <h1>${slug}</h1>
      <div class="stats">${lockedCount}/${state.sections.length} locked</div>
      ${state.drive_url ? `<a href="${state.drive_url}" target="_blank" class="btn">Recordings folder</a>` : ''}
    </header>
  `;

  state.sections.forEach(s => {
    const isLocked = s.locked === 1;
    const isCap = s.takes_used >= 4;
    
    html += `
      <div class="card" id="card-${s.id}">
        <div class="card-header">
          <div>
            <strong>${s.id}</strong>
            <span class="chip ${s.demo ? 'chip-demo' : ''}">${s.demo ? 'DEMO' : 'TALK'}</span>
          </div>
          ${isLocked ? '<span class="chip chip-locked">LOCK</span>' : ''}
        </div>
        
        <div class="display-text">${escapeHtml(s.display_text)}</div>
        ${s.notes ? `<div class="notes">${escapeHtml(s.notes)}</div>` : ''}
        
        <div class="status" id="status-${s.id}">
          ${isCap && !isLocked ? 'Take limit reached — the owner has been notified' : ''}
        </div>

        ${s.has_take ? `<audio controls src="/api/audio/${slug}/${s.id}?t=${token}&cacheBust=${s.takes_used}"></audio>` : ''}

        <div class="controls">
          <div class="takes">t/4: ${s.takes_used}</div>
          
          ${!isLocked ? `
            <button class="btn btn-primary" onclick="generateTake('${s.id}')" id="btn-gen-${s.id}" ${isCap ? 'disabled' : ''}>
              ${s.takes_used > 0 ? 'Regenerate' : 'Generate'}
            </button>
            <button class="btn" onclick="toggleRespell('${s.id}')">Respell</button>
          ` : ''}
          
          ${!isLocked && s.has_take ? `
            <button class="btn btn-danger" onclick="lockTake('${s.id}')">Lock</button>
          ` : ''}
        </div>

        ${!isLocked ? `
          <div class="respell-form" id="respell-${s.id}">
            <textarea id="respell-text-${s.id}">${escapeHtml(s.spoken_text)}</textarea>
            <button class="btn" onclick="saveRespell('${s.id}')">Save</button>
          </div>
        ` : ''}
        
        <div class="footer-msg">
          ${s.demo ? 'Record this section' : 'No recording needed'}
        </div>
      </div>
    `;
  });

  document.getElementById('app').innerHTML = html;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
}

function setStatus(id, msg, isError = false) {
  const el = document.getElementById(`status-${id}`);
  if (el) {
    el.textContent = msg;
    el.className = 'status' + (isError ? ' error' : '');
  }
}

async function generateTake(id) {
  const btn = document.getElementById(`btn-gen-${id}`);
  if (btn) btn.disabled = true;
  setStatus(id, 'Generating… first request can take up to 2 minutes (engine warm-up)');
  
  try {
    const res = await fetch(`/api/tts/${slug}/${id}?t=${token}`, { method: 'POST' });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      setStatus(id, `Error: ${err.error || res.statusText}`, true);
      if (btn) btn.disabled = false;
      if (res.status === 429) fetchState();
      return;
    }
    await fetchState();
  } catch (e) {
    setStatus(id, `Error: ${e.message}`, true);
    if (btn) btn.disabled = false;
  }
}

function toggleRespell(id) {
  const el = document.getElementById(`respell-${id}`);
  if (el) el.classList.toggle('open');
}

async function saveRespell(id) {
  const text = document.getElementById(`respell-text-${id}`).value;
  try {
    const res = await fetch(`/api/respell/${slug}/${id}?t=${token}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ spoken_text: text })
    });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      setStatus(id, `Save error: ${err.error || res.statusText}`, true);
      return;
    }
    setStatus(id, 'Saved respell.');
    toggleRespell(id);
    await fetchState();
  } catch (e) {
    setStatus(id, `Error: ${e.message}`, true);
  }
}

async function lockTake(id) {
  if (!confirm('Locking freezes this audio — you will record to it. There is no unlock.')) return;
  try {
    const res = await fetch(`/api/lock/${slug}/${id}?t=${token}`, { method: 'POST' });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      setStatus(id, `Lock error: ${err.error || res.statusText}`, true);
      return;
    }
    await fetchState();
  } catch (e) {
    setStatus(id, `Error: ${e.message}`, true);
  }
}

fetchState();
</script>
</body>
</html>
