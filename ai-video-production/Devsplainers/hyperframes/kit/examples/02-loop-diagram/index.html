<!doctype html>
<!-- EXAMPLE 02 — Loop diagram. Few-shot ref for Tier-2 #29 (loop) + section
     label chrome. Draw-on dashed ring, center label, 4 staggered node pills. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="stylesheet" href="kit/tokens.css" />
    <link rel="stylesheet" href="kit/atoms.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="kit/recipes.js"></script>
    <style>
      .loop-wrap { position: absolute; inset: 0; display: grid; place-items: center; }
      .ring-svg { position: absolute; width: 620px; height: 620px; }
      .center-label { position: absolute; text-align: center; }
      .node { position: absolute; transform: translate(-50%, -50%); }
      .n-top { top: calc(50% - 310px); left: 50%; }
      .n-right { top: 50%; left: calc(50% + 310px); }
      .n-bottom { top: calc(50% + 310px); left: 50%; }
      .n-left { top: 50%; left: calc(50% - 310px); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="6" data-width="1920" data-height="1080">
      <div id="clip-label" class="clip" data-start="0" data-duration="6" data-track-index="0">
        <div class="section-label is-amber">THE MEMORY LOOP<span class="underline"></span></div>
      </div>
      <div id="clip-watermark" class="clip" data-start="0" data-duration="6" data-track-index="1">
        <div class="watermark">&lt;devsplainers&gt;</div>
      </div>

      <div id="clip-loop" class="clip" data-start="0" data-duration="6" data-track-index="2">
        <div id="loop" class="loop-wrap">
          <svg class="ring-svg" viewBox="0 0 620 620" fill="none">
            <circle id="ring" class="connector is-amber" cx="310" cy="310" r="300" />
          </svg>
          <div class="center-label">
            <div class="headline" style="font-size: 52px;">CONTEXT</div>
          </div>
          <div class="node n-top"><span class="pill is-amber">WRITE</span></div>
          <div class="node n-right"><span class="pill is-blue">INDEX</span></div>
          <div class="node n-bottom"><span class="pill is-blue">RETRIEVE</span></div>
          <div class="node n-left"><span class="pill is-green">REUSE</span></div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      R.fadeUp(tl, '.section-label', 0.1, { y: -16 });
      R.slideIn(tl, '.watermark', 0.2, 'right', { dist: 24 });
      R.fadeUp(tl, '.center-label', 0.35, { duration: R.DUR_SLOW });
      R.drawOn(tl, '#ring', 0.6, { duration: 1.3 });
      R.popIn(tl, '.node', 1.1, { duration: R.DUR, stagger: 0.12 });
      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
