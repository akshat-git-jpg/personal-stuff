      const DATA = {
        title: VARS.title ?? 'Best n8n Self-Hosting in 2026', // the title shown above the chips
        platforms: VARS.platforms ?? PLATFORMS, // the logo chips, left-to-right / wrapping
      };

      /* =====================================================
         ===== TIMELINE (LOCKED — do not edit) =====
         GSAP timeline: paused + registered + deterministic (frame-seekable).
         Easing comes free from GSAP — this is what makes the motion smooth.
         ===================================================== */
      const $ = (id) => document.getElementById(id);

      // build the DOM that depends on DATA (must exist before the timeline targets it)
      function build() {
        $('title').textContent = DATA.title;
        $('chips').innerHTML = DATA.platforms
          .map((p) =>
            p.logoSvg ? `<div class="chip">${p.logoSvg}</div>` : `<div class="chip text">${p.name}</div>`,
          )
          .join('');
      }
      build();

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 1) Breathing backdrop — slow scale pulse over the clip (deterministic, finite yoyo).
      //    Source: scale = 1 + sin(t*0.4)*0.06, drifting gradient origin. We keep the scale
      //    pulse via GSAP; the gradient-origin drift is dropped (sub-pixel, not visible at 1080p).
      tl.fromTo(
        '#bg',
        { scale: 1 },
        { scale: 1.06, duration: 3.93, ease: 'sine.inOut', yoyo: true, repeat: 1 },
        0,
      );

      // 2) Title — scale-in + fade (frames 0->30 => 0->1s), ease ~expo.out.
      tl.from('#title', { opacity: 0, scale: 0.92, duration: 1, ease: 'expo.out' }, 0);

      // 3) Title — gentle breathing depth shadow (deterministic, finite yoyo).
      tl.fromTo(
        '#title',
        { textShadow: '0 12px 40px rgba(167,139,250,0.06), 0 0 16px rgba(255,255,255,0.08)' },
        { textShadow: '0 12px 40px rgba(167,139,250,0.30), 0 0 16px rgba(255,255,255,0.08)', duration: 2.6, ease: 'sine.inOut', yoyo: true, repeat: 3 },
        0,
      );

      // 4) Chips — cascade in (frames 18 + i*3 over 24f), then a gentle continuous bob.
      const chips = gsap.utils.toArray('#chips .chip');
      // entrance: staggered cascade on opacity + scale (source rose+faded each chip in turn).
      // The rise is expressed as scale so `y` stays free for the bob — keeping a single,
      // non-overlapping `y` tween on the selector (the lint flags overlapping `y` tweens).
      tl.from(
        '#chips .chip',
        { opacity: 0, scale: 0.86, duration: 24 / 30, ease: 'expo.out', stagger: 3 / 30 },
        18 / 30,
      );
      // continuous bob — gentle vertical float on every chip. Single non-staggered yoyo
      // (one `y` tween, finite repeat) starting after the last chip has entered.
      const lastEntryEnd = (18 + (chips.length - 1) * 3) / 30 + 24 / 30;
      tl.to(
        '#chips .chip',
        { y: -5, duration: 1.4, ease: 'sine.inOut', yoyo: true, repeat: 4 },
        lastEntryEnd,
      );

      window.__timelines['title-cinematic-float'] = tl;
