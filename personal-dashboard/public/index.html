<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kushal Daily Dashboard" />
  <meta name="theme-color" content="#120f18" />
  <title>Kushal Daily Dashboard</title>
  <script>
    // Default to dark; honor an explicit light choice. Runs before paint to avoid a flash.
    (function () {
      var t = localStorage.getItem('pd-theme');
      var dark = t ? t === 'dark' : true;
      var el = document.documentElement;
      el.classList.toggle('dark', dark);
      el.classList.toggle('light', !dark);
    })();
  </script>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="preload" href="/fonts/fraunces.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<!-- Main app -->
<div id="app" style="display:none">
  <!-- Content area -->
  <div class="content-area" id="content-area"></div>

  <!-- Quick-add bar -->
  <div class="quick-add-wrap">
    <div class="cat-selector" id="cat-selector">
      <button type="button" class="cat-chip active" data-cat="todo">To-do</button>
      <button type="button" class="cat-chip" data-cat="habit">Habit</button>
      <button type="button" class="cat-chip" data-cat="remember">Mindset</button>
      <button type="button" class="cat-chip" data-cat="note">Note</button>
    </div>
    <div class="quick-add-bar">
      <input type="text" id="quick-add-input" placeholder="Add a to-do…" />
      <button id="quick-add-btn" aria-label="Add">+</button>
    </div>
  </div>

  <!-- Tab bar -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Today
    </button>
    <button class="tab-btn" data-tab="todos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 11 12 14 22 4"/>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      To-dos
    </button>
    <button class="tab-btn" data-tab="habits">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Habits
    </button>
    <button class="tab-btn" data-tab="remembers">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      Mindset
    </button>
    <button class="tab-btn" data-tab="notes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="8" y1="13" x2="16" y2="13"/>
        <line x1="8" y1="17" x2="16" y2="17"/>
      </svg>
      Notes
    </button>
    <button class="tab-btn" data-tab="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Settings
    </button>
  </nav>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- Modal container -->
<div id="modal-container"></div>

<!-- Chart.js (self-hosted; defer so a slow lib can't block first paint) -->
<script defer src="/js/vendor/chart.umd.min.js"></script>
<!-- SortableJS (touch-friendly drag-to-reorder; self-hosted) -->
<script defer src="/js/vendor/Sortable.min.js"></script>
<!-- App -->
<script type="module" src="/js/app.js"></script>
</body>
</html>
