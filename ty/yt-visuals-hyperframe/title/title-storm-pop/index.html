<!doctype html>
<!--
  TITLE CARD · Storm + Spring Pop   (Hyperframes port of title-storm-pop)
  Light streaks sweep across + a deterministic particle field drifts upward;
  the title springs in with an elastic overshoot, then the logo chips pop in
  one by one. Warm-amber theme. 1920x1080, 30fps, 10 seconds.

  ┌─────────────────────────────────────────────────────────────────────────┐
  │  EDITOR: you ONLY ever touch the  ===== CONTENT =====  block and          │
  │  the  :root  colors below. Change title / logo chips / colors there.      │
  │  Do NOT touch the  ===== TIMELINE (LOCKED) =====  script — that's the     │
  │  motion. Ask Gemini: "only change DATA and :root, never the timeline."    │
  └─────────────────────────────────────────────────────────────────────────┘

  This is a Hyperframes composition: HTML + GSAP. Render it with
    npx hyperframes@latest render title/title-storm-pop -o out.mp4 --fps 30
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* ===== THEME (editor may change these colors) ===== */
      :root {
        --bg-from: #3a1f08; /* radial gradient origin (burnt amber) */
        --bg-to: #0a0805; /* near-black warm undertone */
        --text: #ffffff;
        --accent: #fb923c; /* bright orange (streaks/particles) */
        --title-glow: rgba(167, 139, 250, 0.35); /* soft purple glow on the title */
        --chip-bg: #ffffff;
        --font: 'Inter', 'Helvetica Neue', Arial, system-ui, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: #000; font-family: var(--font); color: var(--text);
      }
      #root { position: relative; width: 1920px; height: 1080px; }

      #bg {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at 30% 20%, var(--bg-from) 0%, var(--bg-to) 60%);
      }

      /* ambient layers */
      #streaks, #particles { position: absolute; inset: 0; pointer-events: none; }
      .streak { position: absolute; height: 2px; filter: blur(0.5px); will-change: transform, opacity, left; }
      .particle { position: absolute; border-radius: 50%; will-change: top, opacity; }

      /* SlideFrame: centered content, 140px padding */
      #frame {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center; padding: 140px;
      }
      #content {
        display: flex; flex-direction: column; align-items: center; gap: 56px;
        max-width: 1700px; width: 100%;
      }

      #title {
        font-size: 88px; font-weight: 700; letter-spacing: -3px; line-height: 1.04;
        text-align: center; color: var(--text);
        text-shadow: 0 0 32px var(--title-glow);
        will-change: transform, opacity;
      }

      #chips { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 28px; row-gap: 32px; margin-top: 8px; }
      .chip {
        width: 220px; height: 220px; border-radius: 36px; background: var(--chip-bg);
        display: flex; align-items: center; justify-content: center; padding: 26px; flex-shrink: 0;
        box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        will-change: transform, opacity;
      }
      .chip svg { width: 100%; height: 100%; object-fit: contain; }
      /* text-only fallback chip (no logo) */
      .chip.text { width: auto; padding: 0 48px; font-size: 36px; font-weight: 700; color: #0a0805; }
    </style>
  </head>
  <body>
    <!--
      Composition root. data-composition-id "storm" is the timeline key.
      data-duration is the total length in seconds (10s @ 30fps = 300 frames).
    -->
    <div
      id="root"
      data-composition-id="storm"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
      data-composition-variables='{"title":"Best n8n Self-Hosting in 2026"}'
    >
      <!-- Track 0: background (static, always on) -->
      <div id="bg" class="clip" data-start="0" data-duration="10" data-track-index="0"></div>

      <!-- Track 1: light streaks (static shell; GSAP animates the .streak children) -->
      <div id="streaks" class="clip" data-start="0" data-duration="10" data-track-index="1"></div>

      <!-- Track 2: particle field (static shell; GSAP animates the .particle children) -->
      <div id="particles" class="clip" data-start="0" data-duration="10" data-track-index="2"></div>

      <!-- Track 3: content (static clip shell; GSAP animates the children, never the .clip itself) -->
      <div id="frame" class="clip" data-start="0" data-duration="10" data-track-index="3">
        <div id="content">
          <div id="title"></div>
          <div id="chips"></div>
        </div>
      </div>
    </div>

02-.004c1.212-.927 2.585-1.616 4.219-2.105 1.627-.488 3.348-.694 5.162-.694z"/> </svg>` },
          { name: 'Google Cloud', logoSvg: `<svg fill="#4285F4" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12.19 2.38a9.344 9.344 0 0 0-9.234 6.893c.053-.02-.055.013 0 0-3.875 2.551-3.922 8.11-.247 10.941l.006-.007-.007.03a6.717 6.717 0 0 0 4.077 1.356h5.173l.03.03h5.192c6.687.053 9.376-8.605 3.835-12.35a9.365 9.365 0 0 0-2.821-4.552l-.043.043.006-.05A9.344 9.344 0 0 0 12.19 2.38zm-.358 4.146c1.244-.04 2.518.368 3.486 1.15a5.186 5.186 0 0 1 1.862 4.078v.518c3.53-.07 3.53 5.262 0 5.193h-5.193l-.008.009v-.04H6.785a2.59 2.59 0 0 1-1.067-.23h.001a2.597 2.597 0 1 1 3.437-3.437l3.013-3.012A6.747 6.747 0 0 0 8.11 8.24c.018-.01.04-.026.054-.023a5.186 5.186 0 0 1 3.67-1.69z"/></svg>` },

      /* =====================================================
         ===== TIMELINE (LOCKED — do not edit) =====
         GSAP timeline: paused + registered + deterministic (frame-seekable).
         Easing comes free from GSAP — this is what makes the motion smooth.
         Timing converted from the original frame counts: frames ÷ 30 = seconds.
         ===================================================== */
      const $ = (id) => document.getElementById(id);
      const FPS = 30;
      const DURATION = 10; // seconds (must match data-duration)
      const HOLD = DURATION; // particles loop continuously over the whole comp

      const getVar = (name) => {
        try {
          return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        } catch (e) {
          return '';
        }
      };
      const ACCENT = getVar('--accent') || '#fb923c';

      // streak definitions (first 4 used), ported from the original effects.tsx.
      // off = per-streak start offset in frames; sweep lasts 28 frames.
      const STREAKS = [
        { y: 280, len: 380, angle: -8,  off: 4,  color: ACCENT },
        { y: 520, len: 460, angle: 6,   off: 10, color: '#ffffff' },
        { y: 760, len: 320, angle: -10, off: 16, color: ACCENT },
        { y: 140, len: 300, angle: 4,   off: 22, color: '#ffffff' },
      ];
      const STREAK_DELAY = 6; // streaks begin sweeping at this frame

      // deterministic particle field (22 points) — LCG-style seeding preserved
      // EXACTLY from the source so positions are identical and reproducible.
      const PARTICLES = Array.from({ length: 22 }).map((_, i) => {
        const h = (i * 9301 + 49297) % 233280;
        const r = h / 233280;
        return {
          startX: r * 1920,
          startY: (((h * 7) % 233280) / 233280) * 1080,
          drift: 80 + (((h * 11) % 233280) / 233280) * 180,
          size: 2 + (((h * 13) % 233280) / 233280) * 5,
          glow: ((h * 17) % 233280) / 233280 > 0.5 ? ACCENT : '#ffffff',
          duration: 70 + (((h * 19) % 233280) / 233280) * 80, // loop length, frames
          delay: (((h * 23) % 233280) / 233280) * 40, // start offset, frames
        };
      });

      // build the DOM that depends on DATA (must exist before the timeline targets it)
      function build() {
        $('title').textContent = DATA.title;

        // chips
        $('chips').innerHTML = DATA.platforms
          .map((p) =>
            p.logoSvg
              ? `<div class="chip"><div class="chipInner">${p.logoSvg}</div></div>`
              : `<div class="chip text">${p.name}</div>`,
          )
          .join('');
        // unwrap inner so the svg sizes to the chip
        document.querySelectorAll('#chips .chipInner').forEach((el) => {
          const svg = el.querySelector('svg');
          el.replaceWith(svg);
        });

        // streaks
        $('streaks').innerHTML = STREAKS.map(
          (s) =>
            `<div class="streak" style="top:${s.y}px;width:${s.len}px;transform:rotate(${s.angle}deg);
              background:linear-gradient(90deg, transparent, ${s.color}, transparent);"></div>`,
        ).join('');

        // particles
        $('particles').innerHTML = PARTICLES.map(
          (p) =>
            `<div class="particle" style="left:${p.startX}px;width:${p.size}px;height:${p.size}px;
              background:${p.glow};box-shadow:0 0 ${p.size * 3}px ${p.glow};"></div>`,
        ).join('');
      }
      build();

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ---- ambient: light streaks sweep across once (fade in then out) ----
      // Original: left -500 -> 2200 over 28 frames, opacity 0 -> 1 -> 0, eased.
      const streakEls = gsap.utils.toArray('#streaks .streak');
      streakEls.forEach((el, i) => {
        const at = (STREAK_DELAY + STREAKS[i].off) / FPS;
        const dur = 28 / FPS;
        tl.fromTo(
          el,
          { left: -500 },
          { left: 2200, duration: dur, ease: 'power2.out' },
          at,
        );
        // opacity 0 -> 1 (first 40%) -> 0, as one keyframed tween (no overlap)
        tl.fromTo(
          el,
          { opacity: 0 },
          {
            keyframes: {
              opacity: [0, 1, 0],
              ease: 'none',
              easeEach: 'power1.inOut',
            },
            duration: dur,
          },
          at,
        );
      });

      // ---- ambient: particle field drifts upward on independent loops ----
      // Original: each particle rises by `drift` over `duration` frames, fading
      // in/out (sin curve), looping for the whole hold. We model one rise as a
      // yoyo-free repeating tween and derive a finite repeat count from HOLD.
      const partEls = gsap.utils.toArray('#particles .particle');
      partEls.forEach((el, i) => {
        const p = PARTICLES[i];
        const cycle = p.duration / FPS; // seconds per drift loop
        const delay = p.delay / FPS;
        const repeats = Math.max(0, Math.floor((HOLD - delay) / cycle) - 1);
        // upward drift, restarting each cycle
        tl.fromTo(
          el,
          { top: p.startY },
          {
            top: p.startY - p.drift,
            duration: cycle,
            ease: 'none',
            repeat: repeats,
          },
          delay,
        );
        // opacity follows sin(t*PI)*0.6 — model as up (half cycle) then down,
        // yoyo'd across the loop so it fades in and back out each rise.
        tl.fromTo(
          el,
          { opacity: 0 },
          {
            opacity: 0.6,
            duration: cycle / 2,
            ease: 'sine.inOut',
            repeat: repeats * 2 + 1,
            yoyo: true,
          },
          delay,
        );
      });

      // ---- title: elastic spring with overshoot (scale 1.18 -> 1) ----
      // Original Remotion spring(damping 10, stiffness 100, mass 0.6), startFrame 4.
      tl.fromTo(
        '#title',
        { scale: 1.18, opacity: 0 },
        { scale: 1, duration: 1.0, ease: 'elastic.out(1, 0.55)' },
        4 / FPS,
      );
      tl.fromTo('#title', { opacity: 0 }, { opacity: 1, duration: 0.5, ease: 'power2.out' }, 4 / FPS);

      // ---- chips: spring-pop, staggered (scale 0.6 -> 1) ----
      // Original spring(damping 11, stiffness 110, mass 0.5), startFrame 28, stagger 4f.
      tl.fromTo(
        '#chips .chip',
        { scale: 0.6, opacity: 0 },
        {
          scale: 1,
          opacity: 1,
          duration: 0.7,
          ease: 'back.out(2)',
          stagger: 4 / FPS,
        },
        28 / FPS,
      );

      window.__timelines['storm'] = tl;
    </script>
  </body>
</html>
