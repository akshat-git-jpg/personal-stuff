<!doctype html>
<!--
  TITLE CARD · Kinetic Word Reveal   (Hyperframes card)
  A drifting tech grid behind; a small kicker fades in; the title reveals word by
  word, each sliding up out of a clip mask; an accent underline draws across; a
  subtitle settles in under it. 1920x1080, 30fps, 10 seconds.

  ┌─────────────────────────────────────────────────────────────────────────┐
  │  EDITOR: you ONLY ever touch the  ===== CONTENT =====  block and          │
  │  the  :root  colors below. Change kicker / title / subtitle / colors      │
  │  there. Do NOT touch the  ===== TIMELINE (LOCKED) =====  script — that's  │
  │  the motion. Ask Gemini: "only change DATA and :root, never the timeline."│
  └─────────────────────────────────────────────────────────────────────────┘

  Render:  npx hyperframes@latest render title/title-kinetic-lines -o out.mp4 --fps 30
  Override: --variables '{"kicker":"Honest review","title":"Is Notion worth it in 2026?","subtitle":"..."}'
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* ===== THEME (editor may change these colors) ===== */
      :root {
        --bg-from: #3a1f08;   /* radial origin (burnt amber) */
        --bg-to: #0a0805;     /* near-black warm undertone */
        --text: #ffffff;
        --text-dim: rgba(255, 239, 219, 0.6);
        --accent: #fb923c;    /* kicker, underline, glow */
        --grid: rgba(255, 239, 219, 0.06); /* faint grid lines */
        --font: 'Inter', 'Helvetica Neue', Arial, system-ui, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; font-family: var(--font); color: var(--text); }
      #root { position: relative; width: 1920px; height: 1080px; }

      #bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 22%, var(--bg-from) 0%, var(--bg-to) 62%); }

      /* drifting tech grid (clip shell is full-frame; GSAP drifts the inner #grid) */
      #grid { position: absolute; inset: -240px;
        background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
        background-size: 86px 86px;
        -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 48%, #000 30%, transparent 78%);
        mask-image: radial-gradient(ellipse 70% 60% at 50% 48%, #000 30%, transparent 78%);
        will-change: background-position; }

      /* soft accent glow behind the title */
      #glow { position: absolute; inset: 0; background: radial-gradient(ellipse 56% 36% at 50% 50%, color-mix(in srgb, var(--accent) 16%, transparent) 0%, transparent 70%); }

      #frame { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 140px; gap: 34px; }

      /* kicker: flanked by short rules */
      #kicker { display: flex; align-items: center; gap: 20px; color: var(--accent);
        font-size: 30px; font-weight: 800; letter-spacing: 6px; text-transform: uppercase; will-change: transform, opacity; }
      #kicker .rule { width: 56px; height: 3px; background: var(--accent); border-radius: 2px; opacity: 0.7; }

      #title { font-size: 104px; font-weight: 900; letter-spacing: -3px; line-height: 1.05; text-align: center; max-width: 1620px;
        text-shadow: 0 0 36px color-mix(in srgb, var(--accent) 22%, transparent); }
      /* each word lives in an overflow-clip mask so it can slide up from below.
         padding/negative-margin give descenders (g, y, p) room without shifting layout. */
      .mask { display: inline-block; overflow: hidden; vertical-align: top; margin-right: 0.26em;
        padding: 0.08em 0 0.18em; margin-top: -0.08em; margin-bottom: -0.18em; }
      .mask:last-child { margin-right: 0; }
      .word { display: inline-block; will-change: transform; }

      #underline { width: 0; height: 7px; border-radius: 4px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
        box-shadow: 0 0 22px color-mix(in srgb, var(--accent) 60%, transparent); will-change: width, opacity; }

      #subtitle { font-size: 38px; font-weight: 500; color: var(--text-dim); text-align: center; max-width: 1300px; line-height: 1.35; will-change: transform, opacity; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="kinetic" data-start="0" data-duration="10" data-width="1920" data-height="1080"
      data-composition-variables='{"kicker":"Honest review","title":"Is Notion worth it in 2026?","subtitle":"Everything you need to know before you pay a cent."}'>
      <!-- Track 0: background -->
      <div id="bg" class="clip" data-start="0" data-duration="10" data-track-index="0"></div>
      <!-- Track 1: drifting grid (static shell; GSAP drifts the inner #grid) -->
      <div class="clip" data-start="0" data-duration="10" data-track-index="1"><div id="grid"></div></div>
      <!-- Track 2: accent glow -->
      <div id="glow" class="clip" data-start="0" data-duration="10" data-track-index="2"></div>
      <!-- Track 3: content (static clip shell; GSAP animates the children) -->
      <div id="frame" class="clip" data-start="0" data-duration="10" data-track-index="3">
        <div id="kicker"><span class="rule"></span><span id="kickerText"></span><span class="rule"></span></div>
        <h1 id="title"></h1>
        <div id="underline"></div>
        <div id="subtitle"></div>
      </div>
    </div>

    <script>
      /* =====================================================
         ===== CONTENT =====  (editor / Gemini edits ONLY this)
         kicker  : small eyebrow line above the title ('' to hide)
         title   : the headline — revealed word by word
         subtitle: the line below the underline ('' to hide)
         Per-video values can also be passed at render time with
           --variables '{"title":"My New Title"}'
         ===================================================== */
      const VARS = (window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : null) || {};
      const DATA = {
        kicker: VARS.kicker ?? 'Honest review',
        title: VARS.title ?? 'Is Notion worth it in 2026?',
        subtitle: VARS.subtitle ?? 'Everything you need to know before you pay a cent.',
      };

      /* ===== TIMELINE (LOCKED) ===== */
      const $ = (id) => document.getElementById(id);
      // kicker
      if (DATA.kicker) { $('kickerText').textContent = DATA.kicker; }
      else { $('kicker').style.display = 'none'; }
      // title → one clip-masked word per word
      $('title').innerHTML = DATA.title
        .split(/\s+/)
        .filter(Boolean)
        .map((w) => `<span class="mask"><span class="word">${w}</span></span>`)
        .join('');
      // subtitle
      if (DATA.subtitle) { $('subtitle').textContent = DATA.subtitle; }
      else { $('subtitle').style.display = 'none'; }

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // grid drifts up slowly across the whole comp (one cell = seamless)
      tl.fromTo('#grid', { backgroundPositionY: '0px' }, { backgroundPositionY: '86px', duration: 10, ease: 'none' }, 0);

      // kicker fades up, its flanking rules grow out
      if (DATA.kicker) {
        tl.from('#kicker', { opacity: 0, y: -14, duration: 0.5, ease: 'power3.out' }, 0.15);
        tl.from('#kicker .rule', { scaleX: 0, duration: 0.5, ease: 'power3.out', transformOrigin: '50% 50%' }, 0.25);
      }

      // title: each word slides up out of its mask, staggered
      tl.fromTo('#title .word', { yPercent: 118 }, { yPercent: 0, duration: 0.8, ease: 'expo.out', stagger: 0.085 }, 0.4);

      // underline draws across once the words have landed
      tl.fromTo('#underline', { width: 0, opacity: 0 }, { width: 560, opacity: 1, duration: 0.7, ease: 'power3.inOut' }, 1.15);

      // subtitle settles in last
      if (DATA.subtitle) tl.from('#subtitle', { opacity: 0, y: 16, duration: 0.6, ease: 'power3.out' }, 1.5);

      window.__timelines['kinetic'] = tl;
    </script>
  </body>
</html>
