<!doctype html>
<!--
  FEATURE MATRIX   (Hyperframes card)
  Comparison table: features (rows) x products (columns), cells = ✓ / ✕ / value.
  Header reveals, then rows stagger in. 1920x1080, 30fps, 7 seconds.

  EDITOR: edit only ===== CONTENT ===== (products[], features[]) + :root. Cell values:
  true => ✓, false => ✕, or any string shows as text. Render-time override:
    --variables '{"products":["A","B"],"features":[{"name":"Free tier","values":[true,false]}]}'
  Render:  npx hyperframes@latest render comparison/feature-matrix -o out.mp4 --fps 30
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --bg-from: #3a1f08; --bg-to: #0a0805;
        --text: #ffffff; --text-dim: rgba(255, 239, 219, 0.55);
        --yes: #34d399; --no: rgba(255,255,255,0.28); --accent: #fb923c;
        --font: 'Inter', system-ui, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; font-family: var(--font); color: var(--text); }
      #root { position: relative; width: 1920px; height: 1080px; }
      #bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, var(--bg-from) 0%, var(--bg-to) 60%); }
      #frame { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 120px; }
      #table { width: 100%; max-width: 1600px; }
      .grid { display: grid; gap: 0; }
      .cell { padding: 24px 22px; display: flex; align-items: center; }
      .hcell { font-size: 30px; font-weight: 800; justify-content: center; }
      .hcell.feat { justify-content: flex-start; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; font-size: 20px; }
      .frow .cell { border-top: 1px solid rgba(255,255,255,0.08); }
      .feat { font-size: 26px; font-weight: 600; color: var(--text); }
      .val { justify-content: center; font-size: 30px; font-weight: 800; }
      .val.yes { color: var(--yes); }
      .val.no { color: var(--no); }
      .val.txt { color: var(--text-dim); font-size: 24px; font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="matrix" data-start="0" data-duration="7" data-width="1920" data-height="1080"
      data-composition-variables='{"products":["Hostinger","Railway","Fly.io"],"features":[{"name":"Free tier","values":[false,true,true]},{"name":"1-click n8n","values":[true,false,false]},{"name":"Auto-scale","values":[false,true,true]},{"name":"EU region","values":[true,true,true]},{"name":"From / mo","values":["$4","$5","$3"]}]}'>
      <div id="bg" class="clip" data-start="0" data-duration="7" data-track-index="0"></div>
      <div id="frame" class="clip" data-start="0" data-duration="7" data-track-index="1">
        <div id="table"><div class="grid" id="grid"></div></div>
      </div>
    </div>

    <script>
      /* ===== CONTENT ===== */
      const VARS = (window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : null) || {};
      const DATA = {
        products: VARS.products ?? ['Hostinger', 'Railway', 'Fly.io'],
        features: VARS.features ?? [
          { name: 'Free tier', values: [false, true, true] },
          { name: '1-click n8n', values: [true, false, false] },
          { name: 'Auto-scale', values: [false, true, true] },
          { name: 'EU region', values: [true, true, true] },
          { name: 'From / mo', values: ['$4', '$5', '$3'] },
        ],
      };

      /* ===== TIMELINE (LOCKED) ===== */
      const grid = document.getElementById('grid');
      function cellVal(v) {
        if (v === true) return '<div class="cell val yes">✓</div>';
        if (v === false) return '<div class="cell val no">✕</div>';
        return `<div class="cell val txt">${v}</div>`;
      }
      function build() {
        grid.style.gridTemplateColumns = `1.4fr repeat(${DATA.products.length}, 1fr)`;
        let html = '<div class="hrow" style="display:contents">';
        html += '<div class="cell hcell feat">Feature</div>';
        html += DATA.products.map((p) => `<div class="cell hcell">${p}</div>`).join('');
        html += '</div>';
        html += DATA.features
          .map(
            (f) =>
              `<div class="frow" style="display:contents"><div class="cell feat">${f.name}</div>${f.values.map(cellVal).join('')}</div>`,
          )
          .join('');
        grid.innerHTML = html;
      }
      build();

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from('.hrow .cell', { opacity: 0, y: -18, duration: 0.5, ease: 'power3.out', stagger: 0.06 }, 0.1);
      // .frow uses display:contents (no box to animate) — animate the cells, cascading by row.
      tl.from('.frow .cell', { opacity: 0, y: 18, duration: 0.45, ease: 'power2.out', stagger: 0.05 }, 0.6);
      window.__timelines['matrix'] = tl;
    </script>
  </body>
</html>
