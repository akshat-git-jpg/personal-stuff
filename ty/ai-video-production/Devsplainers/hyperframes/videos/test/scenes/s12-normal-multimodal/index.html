<!doctype html>
<!-- ============================================================================
  STATIC PASS · scene 12 · normal-multimodal
  Build the FINAL-FRAME look for row 12 of ../../storyboard.md.
  Rules: compose ONLY from kit atoms (kit/atoms.md) + tokens; NO motion this pass
  (leave the timeline empty — M3 adds it). Assets are root-relative "kit/..."
  and resolve through the ./kit symlink. Keep the watermark. Verify with:
    node verify/verify.mjs videos/test/scenes/s12-normal-multimodal
============================================================================ -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="stylesheet" href="kit/tokens.css" />
    <link rel="stylesheet" href="kit/atoms.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="kit/recipes.js"></script>
    <style>
      .title-block { position: absolute; top: 120px; left: 0; right: 0; text-align: center; }
      .diagram-stage { position: absolute; top: 380px; left: 50%; transform: translateX(-50%); width: 900px; height: 400px; display: flex; align-items: center; justify-content: space-between; }
      .inputs-stack { display: flex; flex-direction: column; gap: var(--sp-4); }
      .connector-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
      .stamp-block { position: absolute; bottom: 120px; left: 0; right: 0; text-align: center; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="8" data-width="1920" data-height="1080">
      <!-- chrome -->
      <div id="clip-watermark" class="clip" data-start="0" data-duration="8" data-track-index="0">
        <div class="watermark">&lt;devsplainers&gt;</div>
      </div>

      <!-- Track 1: Section Label -->
      <div id="clip-section" class="clip" data-start="0" data-duration="8" data-track-index="1">
        <div class="section-label">1 WHAT'S AN ENCODER?</div>
      </div>

      <!-- Track 2: Title -->
      <div id="clip-title" class="clip" data-start="0" data-duration="8" data-track-index="2">
        <div class="title-block">
          <h1 class="headline">THE <span class="blue">NORMAL</span> MULTIMODAL MODEL</h1>
        </div>
      </div>

      <!-- Track 3: Diagram -->
      <div id="clip-diagram" class="clip" data-start="0" data-duration="8" data-track-index="3">
        <div class="diagram-stage">
          <!-- Connector Edges -->
          <svg class="connector-svg" viewBox="0 0 900 400">
            <path class="connector is-blue" d="M 260 100 Q 440 100 620 200" />
            <path class="connector is-blue" d="M 260 300 Q 440 300 620 200" />
          </svg>

          <!-- Left Stack: Paragraph inputs -->
          <div class="inputs-stack">
            <!-- Card 1 -->
            <div class="card is-blue" style="width: 260px;">
              <span class="tag">VISION</span>
              <span class="title">DESCRIPTION</span>
              <div class="lines">
                <i></i>
                <i></i>
              </div>
            </div>
            <!-- Card 2 -->
            <div class="card is-blue" style="width: 260px;">
              <span class="tag">AUDIO</span>
              <span class="title">TRANSCRIPT</span>
              <div class="lines">
                <i></i>
                <i></i>
              </div>
            </div>
          </div>

          <!-- Right: Executive LM Card -->
          <div class="card" style="width: 280px; border-color: var(--blue);">
            <span class="tag" style="background: var(--blue); color: var(--fg);">EXECUTIVE</span>
            <span class="title">LANGUAGE MODEL</span>
            <div style="display: flex; justify-content: center; margin-top: 16px;">
              <svg class="icon is-blue" viewBox="0 0 48 48" style="width: 80px; height: 80px;">
                <circle cx="24" cy="16" r="8" />
                <path d="M8 38 C8 30, 16 28, 24 28 C32 28, 40 30, 40 38" />
              </svg>
            </div>
          </div>
        </div>
      </div>

      <!-- Track 4: Stamp and Caption -->
      <div id="clip-payoff" class="clip" data-start="0" data-duration="8" data-track-index="4">
        <div class="stamp-block">
          <div class="stamp" style="background: var(--blue); color: var(--fg); margin-bottom: 24px;">NORMAL MULTIMODAL MODEL</div>
          <p class="caption">TWO TIDY PARAGRAPHS → SHE DOES HER JOB</p>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Motion Pass Choreography
      R.slideIn(tl, '.watermark', 0.2, 'right', { dist: 24 });
      R.fadeUp(tl, '.section-label', 0.2);
      R.fadeUp(tl, '#clip-title .headline', 0.3);

      // Diagram nodes & connectors
      R.staggerIn(tl, '.inputs-stack .card', 0.8, { stagger: 0.12 });
      R.drawOn(tl, '.connector-svg .connector', 1.4);
      R.popIn(tl, '.diagram-stage > .card', 2.0);

      // Payoff stamp & caption
      R.popIn(tl, '.stamp-block .stamp', 2.6);
      R.fadeUp(tl, '.stamp-block .caption', 3.0);

      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
