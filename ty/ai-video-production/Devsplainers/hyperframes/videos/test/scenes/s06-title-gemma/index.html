<!doctype html>
<!-- ============================================================================
  STATIC PASS · scene 06 · title-gemma
  Build the FINAL-FRAME look for row 6 of ../../storyboard.md.

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="stylesheet" href="kit/tokens.css" />
    <link rel="stylesheet" href="kit/atoms.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="kit/recipes.js"></script>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="4" data-width="1920" data-height="1080">
      <!-- chrome -->
      <div id="clip-watermark" class="clip" data-start="0" data-duration="4" data-track-index="0">
        <div class="watermark">&lt;devsplainers&gt;</div>
      </div>
      <!-- Track 1: Title Card -->
      <div id="clip-body" class="clip" data-start="0" data-duration="4" data-track-index="1">
        <div id="body" class="stage-center scene-title">
          <h1 class="headline is-hero">GEMMA 4 <span class="amber">12B</span></h1>
          <p class="subtitle" style="margin-top: 20px;">ENCODER-FREE MULTIMODALITY</p>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Motion Pass Choreography
      R.slideIn(tl, '.watermark', 0.2, 'right', { dist: 24 });
      R.fadeUp(tl, '#clip-body .headline', 0.3);
      R.fadeUp(tl, '#clip-body .subtitle', 0.7);

      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
