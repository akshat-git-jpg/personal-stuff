<!doctype html>
<!-- ============================================================================
  STATIC PASS · scene 02 · eyes-ears-removed
  Build the FINAL-FRAME look for row 2 of ../../storyboard.md.
  Rules: compose ONLY from kit atoms (kit/atoms.md) + tokens; NO motion this pass
  (leave the timeline empty — M3 adds it). Assets are root-relative "kit/..."
  and resolve through the ./kit symlink. Keep the watermark. Verify with:
    node verify/verify.mjs videos/test/scenes/s02-eyes-ears-removed
============================================================================ -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="stylesheet" href="kit/tokens.css" />
    <link rel="stylesheet" href="kit/atoms.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      .title-block { position: absolute; top: 140px; left: 0; right: 0; text-align: center; }
      .diagram-stage { position: absolute; top: 460px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; }
      .model-node { display: flex; flex-direction: column; align-items: center; position: relative; width: 200px; }
      .icon-drop-left { position: absolute; left: -160px; top: 80px; display: flex; flex-direction: column; align-items: center; }
      .icon-drop-right { position: absolute; right: -160px; top: 80px; display: flex; flex-direction: column; align-items: center; }
      .strike-x { position: absolute; top: 0; left: 0; width: 80px; height: 80px; pointer-events: none; }
      .connector-svg { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 400px; height: 200px; pointer-events: none; }
      .caption-block { position: absolute; bottom: 140px; left: 0; right: 0; text-align: center; }
    </style>
    <script src="kit/recipes.js"></script>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="5" data-width="1920" data-height="1080">
      <!-- chrome -->
      <div id="clip-watermark" class="clip" data-start="0" data-duration="5" data-track-index="0">
        <div class="watermark">&lt;devsplainers&gt;</div>
      </div>

      <!-- Track 1: headline -->
      <div id="clip-title" class="clip" data-start="0" data-duration="5" data-track-index="1">
        <div class="title-block">
          <h1 class="headline">...AND TORE OUT ITS <span class="red">EYES + EARS</span></h1>
        </div>
      </div>

      <!-- Track 2: diagram -->
      <div id="clip-diagram" class="clip" data-start="0" data-duration="5" data-track-index="2">
        <div class="diagram-stage">
          <div class="model-node">
            <!-- Connector SVG -->
            <svg class="connector-svg" viewBox="0 0 400 200">
              <path class="connector is-red" d="M 200 60 Q 120 70 40 120" />
              <path class="connector is-red" d="M 200 60 Q 280 70 360 120" />
            </svg>

            <!-- Central model face (white/neutral now, since inputs are gone) -->
            <svg class="icon is-lg" viewBox="0 0 48 48" style="width: 120px; height: 120px; position: relative; z-index: 10;">
              <circle cx="24" cy="24" r="18" fill="none" stroke="currentColor" stroke-width="2" />
              <circle cx="18" cy="20" r="1.5" fill="currentColor" />
              <circle cx="30" cy="20" r="1.5" fill="currentColor" />
              <path d="M18 28 L30 28" fill="none" stroke="currentColor" stroke-width="2" />
            </svg>
            <span class="pill" style="margin-top: 16px; position: relative; z-index: 10;">LANGUAGE MODEL</span>

            <!-- Dropped Eye Icon (Left) -->
            <div class="icon-drop-left">
              <div style="position: relative;">
                <svg class="icon is-red" viewBox="0 0 48 48" style="width: 80px; height: 80px; opacity: 0.6;">
                  <path d="M8 24 Q24 10 40 24 Q24 38 8 24 Z" fill="none" stroke="currentColor" stroke-width="2" />
                  <circle cx="24" cy="24" r="6" fill="currentColor" />
                </svg>
                <!-- Red X overlay -->
                <svg class="strike-x" viewBox="0 0 48 48">
                  <line x1="10" y1="10" x2="38" y2="38" stroke="var(--red)" stroke-width="3" stroke-linecap="round" />
                  <line x1="38" y1="10" x2="10" y2="38" stroke="var(--red)" stroke-width="3" stroke-linecap="round" />
                </svg>
              </div>
              <span class="pill is-red" style="margin-top: 8px;">VISION</span>
            </div>

            <!-- Dropped Ear Icon (Right) -->
            <div class="icon-drop-right">
              <div style="position: relative;">
                <svg class="icon is-red" viewBox="0 0 48 48" style="width: 80px; height: 80px; opacity: 0.6;">
                  <path d="M16 24 C16 16, 24 12, 30 16 C34 19, 34 27, 28 30 C26 31, 26 34, 28 36 C30 38, 24 40, 20 36 C18 34, 18 28, 18 28" fill="none" stroke="currentColor" stroke-width="2" />
                  <path d="M22 22 C24 20, 28 22, 28 26" fill="none" stroke="currentColor" stroke-width="2" />
                </svg>
                <!-- Red X overlay -->
                <svg class="strike-x" viewBox="0 0 48 48">
                  <line x1="10" y1="10" x2="38" y2="38" stroke="var(--red)" stroke-width="3" stroke-linecap="round" />
                  <line x1="38" y1="10" x2="10" y2="38" stroke="var(--red)" stroke-width="3" stroke-linecap="round" />
                </svg>
              </div>
              <span class="pill is-red" style="margin-top: 8px;">AUDIO</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Track 3: Caption -->
      <div id="clip-caption" class="clip" data-start="0" data-duration="5" data-track-index="3">
        <div class="caption-block">
          <p class="caption is-bad">RIGHT BEFORE RELEASE</p>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Motion Pass Choreography
      R.slideIn(tl, '.watermark', 0.2, 'right', { dist: 24 });
      R.fadeUp(tl, '#clip-title .headline', 0.2);
      R.popIn(tl, '.model-node > .icon-lg', 0.5);
      R.popIn(tl, '.model-node > .pill', 0.7);
      R.drawOn(tl, '.connector-svg .connector', 0.9);
      R.popIn(tl, ['.icon-drop-left', '.icon-drop-right'], 1.3, { stagger: 0.1 });
      R.drawOn(tl, '.strike-x line', 1.7);
      R.fadeUp(tl, '#clip-caption .caption', 2.1);

      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
