<!doctype html>
<!-- ============================================================================
  STATIC PASS · scene 04 · hn-quote
  Build the FINAL-FRAME look for row 4 of ../../storyboard.md.
  Rules: compose ONLY from kit atoms (kit/atoms.md) + tokens; NO motion this pass
  (leave the timeline empty — M3 adds it). Assets are root-relative "kit/..."
  and resolve through the ./kit symlink. Keep the watermark. Verify with:
    node verify/verify.mjs videos/test/scenes/s04-hn-quote
============================================================================ -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="stylesheet" href="kit/tokens.css" />
    <link rel="stylesheet" href="kit/atoms.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="kit/recipes.js"></script>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="7" data-width="1920" data-height="1080">
      <!-- chrome -->
      <div id="clip-watermark" class="clip" data-start="0" data-duration="7" data-track-index="0">
        <div class="watermark">&lt;devsplainers&gt;</div>
      </div>
      <!-- Track 1: Pull-quote content -->
      <div id="clip-body" class="clip" data-start="0" data-duration="7" data-track-index="1">
        <div id="body" class="stage-center scene-quote">
          <blockquote class="pull-quote">
            <span class="quote-text" style="display: block;">"read it 3× and still can't figure out how it's possible"</span>
            <span class="attr">— top comment, Hacker News</span>
          </blockquote>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Motion Pass Choreography
      R.slideIn(tl, '.watermark', 0.2, 'right', { dist: 24 });
      R.fadeUp(tl, '.pull-quote .quote-text', 0.4);
      R.fadeUp(tl, '.pull-quote .attr', 1.0);

      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
