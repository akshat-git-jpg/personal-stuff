<!doctype html>
<!-- ============================================================================

  Rules: compose ONLY from kit atoms (kit/atoms.md) + tokens; NO motion this pass
  (leave the timeline empty — M3 adds it). Assets are root-relative "kit/..."

<html lang="en">

    <style>

    <div id="root" data-composition-id="main" data-start="0" data-duration="8" data-width="1920" data-height="1080">

      </div>

      <!-- Track 1: headline -->
      <div id="clip-title" class="clip" data-start="0" data-duration="8" data-track-index="1">
        <div class="title-block">
          <h1 class="headline">GOOGLE BUILT A MODEL THAT <span class="amber">SEES + HEARS</span></h1>
        </div>
      </div>

      <!-- Track 2: diagram -->
      <div id="clip-diagram" class="clip" data-start="0" data-duration="8" data-track-index="2">
        <div class="diagram-stage">
          <div class="pipeline" style="display: flex; align-items: center; gap: 40px;">

            <div class="node" style="display: flex; flex-direction: column; align-items: center; gap: 16px;">

            <div class="model-node">

              </svg>
              <span class="pill is-amber" style="margin-top: 16px;">GEMMA 4</span>

            <!-- Right Connector -->
            <svg class="link" viewBox="0 0 90 2" style="width: 90px; height: 2px;">
              <line class="connector is-blue" x1="0" y1="1" x2="90" y2="1" stroke="currentColor" stroke-width="2" />

            <!-- Right: Voice Memo Input -->
            <div class="node" style="display: flex; flex-direction: column; align-items: center; gap: 16px;">

        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Motion Pass Choreography
      R.slideIn(tl, '.watermark', 0.2, 'right', { dist: 24 });
      R.fadeUp(tl, '.headline', 0.2);
      R.popIn(tl, '.model-node .icon-lg', 0.6);
      R.popIn(tl, '.model-node > .pill', 0.8);
      R.popIn(tl, '.pipeline > .node', 1.1, { stagger: 0.1 });
      R.drawOn(tl, '.pipeline > .link .connector', 1.4);
      R.popIn(tl, '.sensory-row .icon', 1.9, { stagger: 0.1 });

      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
