<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root{--teal:#274d4d;--gold:#C8A24B;--coral:#E2826A;--cream:#F4EFE5;--ink:#23302f;--hf:'Poppins';--bf:'Inter';}
  *{margin:0;padding:0;box-sizing:border-box}
  #pin{width:1000px;background:var(--cream);font-family:var(--bf),system-ui,sans-serif;color:var(--ink);padding:34px 30px 0;position:relative}
  /* header */
  .brand{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px}
  .brand .mark{font-size:40px}
  .brand .name{font-family:var(--hf);font-weight:900;font-size:46px;letter-spacing:.04em;color:var(--teal)}
  .brand .name small{display:block;font-size:18px;letter-spacing:.42em;font-weight:700;color:var(--gold);margin-top:-6px;text-align:center}
  .tagline{font-family:var(--hf);font-weight:800;font-size:42px;text-align:center;color:var(--teal);margin:6px 0 22px;letter-spacing:.01em}
  .tagline .hl{color:var(--gold)}
  /* grid */
  .grid{display:grid;grid-template-columns:96px repeat(4,1fr);gap:10px;margin-bottom:10px}
  .colhead{background:var(--teal);color:#fff;font-family:var(--hf);font-weight:700;font-size:17px;text-align:center;padding:12px 6px;border-radius:10px}
  .colhead.snack{background:var(--coral)}
  .daytab{background:var(--teal);color:#fff;font-family:var(--hf);display:flex;flex-direction:column;align-items:center;justify-content:center;
    clip-path:polygon(0 0,82% 0,100% 50%,82% 100%,0 100%);padding-right:10px}
  .daytab.alt{background:var(--gold)}
  .daytab .d{font-size:15px;font-weight:600;opacity:.9}
  .daytab .n{font-size:34px;font-weight:900;line-height:.9}
  .cell{background:#fff;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .cell .img{height:118px;background-size:cover;background-position:center;background-color:#e7e2d6}
  .cell .lbl{flex:1;padding:8px 8px 11px;font-size:12.5px;font-weight:600;text-align:center;line-height:1.16;display:flex;align-items:center;justify-content:center}
  .rowtint-0 .cell{background:#eef3f1}.rowtint-1 .cell{background:#f3ecdc}
  .cell.snack{background:#f7e7e0 !important}
  /* tips */
  .tips{border:2px solid var(--teal);border-radius:16px;margin:20px 0 24px;padding:30px 20px 22px;position:relative;display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .tips .cap{position:absolute;top:-17px;left:50%;transform:translateX(-50%);background:var(--teal);color:#fff;font-family:var(--hf);font-weight:700;font-size:16px;letter-spacing:.06em;padding:7px 22px;border-radius:999px;white-space:nowrap}
  .tip{text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
  .tip .ic{font-size:30px}
  .tip .tl{font-size:13px;font-weight:600;line-height:1.2;color:var(--teal)}
  /* footer */
  .foot{margin:0 -30px;background:var(--teal);color:#fff;padding:18px 30px;display:flex;align-items:center;gap:16px}
  .foot .fb{font-family:var(--hf);font-weight:900;font-size:20px;letter-spacing:.04em}
  .foot .fn{font-size:14px;opacity:.9;font-weight:600}
  .foot .cta{margin-left:auto;background:var(--coral);color:#fff;font-family:var(--hf);font-weight:800;font-size:18px;padding:13px 26px;border-radius:10px}
</style>
</head>
<body>
  <div id="pin">
    <div class="brand"><div class="mark" id="mark"></div><div class="name" id="bname"></div></div>
    <div class="tagline" id="tagline"></div>
    <div class="grid" id="grid"></div>
    <div class="tips"><div class="cap" id="tipscap">KETO TIPS FOR PEAK PERFORMANCE</div><div id="tipsrow" style="display:contents"></div></div>
    <div class="foot"><span class="fb" id="fb"></span><span class="fn" id="fn"></span><span class="cta" id="cta"></span></div>
  </div>
<script>
window.PIN = __PIN_DATA__;
(function(){
  const P=window.PIN||{};
  const r=document.documentElement;
  const pal=P.palette||['#1B4332','#FFB703','#FFFFFF'];
  if(P.headlineFont) r.style.setProperty('--hf',"'"+P.headlineFont+"'");
  if(P.bodyFont) r.style.setProperty('--bf',"'"+P.bodyFont+"'");
  if(P.teal) r.style.setProperty('--teal',P.teal);
  if(P.gold) r.style.setProperty('--gold',P.gold);
  if(P.coral) r.style.setProperty('--coral',P.coral);
  if(P.cream) r.style.setProperty('--cream',P.cream);
  const link=document.createElement('link');link.rel='stylesheet';
  const hf=(P.headlineFont||'Poppins').replace(/ /g,'+'),bf=(P.bodyFont||'Inter').replace(/ /g,'+');
  link.href=`https://fonts.googleapis.com/css2?family=${hf}:wght@600;700;800;900&family=${bf}:wght@400;600;700&display=swap`;
  document.head.appendChild(link);

  document.getElementById('mark').textContent=P.logo||'⛰️';
  const bn=document.getElementById('bname');
  const parts=(P.brandName||'BRAND').split(' ');
  bn.innerHTML=parts[0]+(parts.length>1?'<small>'+parts.slice(1).join(' ')+'</small>':'');
  document.getElementById('tagline').innerHTML=P.taglineHtml||(P.tagline||'WEEKLY PLAN');
  document.getElementById('tipscap').textContent=P.tipsCaption||'TIPS FOR PEAK PERFORMANCE';
  document.getElementById('fb').textContent=P.footerBrand||P.brandName||'';
  document.getElementById('fn').textContent=P.footerNote||'';
  document.getElementById('cta').textContent=P.footerCta||'Visit Site';

  const style=P.imgStyle||'professional food photography, top-down, on a plate, soft natural light, appetizing';
  const poll=(name,seed)=>'https://image.pollinations.ai/prompt/'+encodeURIComponent(name+', '+style)+'?width=400&height=320&nologo=true&model=flux&seed='+seed;

  const grid=document.getElementById('grid');
  // column header row
  grid.appendChild(document.createElement('div')); // empty corner
  (P.columns||['Morning','Mid-Day','Evening','Snack']).forEach((c,i)=>{
    const d=document.createElement('div');d.className='colhead'+(i===3?' snack':'');d.textContent=c;grid.appendChild(d);
  });
  // day rows
  (P.days||[]).forEach((day,di)=>{
    const tab=document.createElement('div');tab.className='daytab'+(di%2?' alt':'');
    tab.innerHTML='<span class="d">Day</span><span class="n">'+(day.label||(di+1))+'</span>';
    grid.appendChild(tab);
    (day.cells||[]).forEach((cell,ci)=>{
      const el=document.createElement('div');el.className='cell rowtint-'+(di%2)+(ci===3?' snack':'');
      const img=document.createElement('div');img.className='img';
      const url=cell.img||poll(cell.name||'food',di*4+ci);
      img.style.backgroundImage='url("'+url+'")';
      const lbl=document.createElement('div');lbl.className='lbl';lbl.textContent=cell.name||'';
      el.append(img,lbl);grid.appendChild(el);
    });
  });
  // tips
  const tr=document.getElementById('tipsrow');
  (P.tips||[]).forEach(t=>{
    const el=document.createElement('div');el.className='tip';
    el.innerHTML='<div class="ic"></div><div class="tl"></div>';
    el.querySelector('.ic').textContent=t.icon||'•';
    el.querySelector('.tl').textContent=t.label||'';
    tr.appendChild(el);
  });
})();
</script>
</body>
</html>
