<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Visual DSA Revision Guide showing variations in 1 page. Interactive animations, code highlighting, and static timelines.">
  <title>DSA Revision Guide & Visualizer</title>
  
  <!-- Font Integrations -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      
      /* Color Palette - Slate Dark Default */
      --bg-app: #0b0f19;
      --bg-sidebar: #111827;
      --bg-card: rgba(31, 41, 55, 0.35);
      --bg-card-hover: rgba(31, 41, 55, 0.5);
      --border-card: rgba(255, 255, 255, 0.08);
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      
      --accent-primary: #6366f1;
      --accent-hover: #4f46e5;
      --accent-glow: rgba(99, 102, 241, 0.15);
      
      --pointer-l: #10b981;
      --pointer-r: #f43f5e;
      --pointer-mid: #f59e0b;
      --pointer-slow: #3b82f6;
      --pointer-fast: #ec4899;
      
      --cell-bg: #1f2937;
      --cell-border: rgba(255, 255, 255, 0.1);
      --cell-text: #f3f4f6;
      --cell-active: rgba(99, 102, 241, 0.25);
      --cell-swap: rgba(245, 158, 11, 0.25);
      --cell-success: rgba(16, 185, 129, 0.25);
      
      --shadow-neon: 0 0 20px rgba(99, 102, 241, 0.1);
      --transition-speed: 0.2s;
    }

    [data-theme="light"] {
      --bg-app: #f3f4f6;
      --bg-sidebar: #ffffff;
      --bg-card: rgba(255, 255, 255, 0.75);
      --bg-card-hover: rgba(255, 255, 255, 0.9);
      --border-card: rgba(0, 0, 0, 0.08);
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-muted: #9ca3af;
      
      --accent-primary: #4f46e5;
      --accent-hover: #4338ca;
      --accent-glow: rgba(79, 70, 229, 0.12);
      
      --cell-bg: #e5e7eb;
      --cell-border: rgba(0, 0, 0, 0.08);
      --cell-text: #1f2937;
      --cell-active: rgba(79, 70, 229, 0.18);
      --cell-swap: rgba(217, 119, 6, 0.18);
      --cell-success: rgba(22, 163, 74, 0.18);
      
      --shadow-neon: 0 0 20px rgba(79, 70, 229, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-app);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background-color var(--transition-speed), color var(--transition-speed);
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-card);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Layout Components */
    aside {
      width: 280px;
      background-color: var(--bg-sidebar);
      border-inline-end: 1px solid var(--border-card);
      padding: 2rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      position: fixed;
      height: 100vh;
      z-index: 100;
      transition: background-color var(--transition-speed), border-color var(--transition-speed);
    }

    main {
      margin-left: 280px;
      flex: 1;
      padding: 2rem 3rem;
      max-width: 1400px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* Brand Header */
    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    
    .brand-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent-primary), #ec4899);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: var(--shadow-neon);
    }

    .brand-title {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, var(--text-primary), var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Theme Toggle */
    .theme-toggle-btn {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .theme-toggle-btn:hover {
      background: var(--accent-glow);
      border-color: var(--accent-primary);
      transform: scale(1.05);
    }

    /* Sidebar Widget Styling */
    .sidebar-widget {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      background: rgba(255,255,255,0.01);
      padding: 0.75rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border-card);
    }

    .widget-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .search-input {
      width: 100%;
      background: var(--bg-app);
      border: 1px solid var(--border-card);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .tag-filter-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .tag-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      color: var(--text-secondary);
      padding: 0.2rem 0.5rem;
      border-radius: 100px;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.2s;
    }
    .tag-btn.active, .tag-btn:hover {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
    }

    /* Navigation Lists */
    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .nav-item button {
      width: 100%;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: all 0.2s;
    }

    .nav-item.active button, .nav-item button:hover {
      background: var(--accent-glow);
      color: var(--text-primary);
      box-shadow: inset 3px 0 0 var(--accent-primary);
    }

    /* Views Selector Tabs */
    .view-selector {
      display: flex;
      gap: 0.5rem;
      background: rgba(0,0,0,0.15);
      border: 1px solid var(--border-card);
      padding: 0.25rem;
      border-radius: 8px;
    }
    .view-tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.4rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .view-tab-btn.active {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    /* Main Headings */
    .dashboard-header {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      background: linear-gradient(135deg, var(--text-primary) 60%, var(--accent-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    /* Page Views Switcher */
    .page-view {
      display: none;
    }
    .page-view.active {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Glassmorphic Flavor Cards */
    .flavor-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      backdrop-filter: blur(12px);
      transition: border-color var(--transition-speed), background-color var(--transition-speed);
    }
    .flavor-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(99, 102, 241, 0.2);
    }

    .flavor-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .flavor-num {
      background: var(--accent-glow);
      color: var(--accent-primary);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      letter-spacing: 0.05em;
    }

    .flavor-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-primary);
      flex: 1;
    }

    .meta-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      background: rgba(255,255,255,0.03);
      color: var(--text-secondary);
      border: 1px solid var(--border-card);
    }
    
    .meta-badge.complexity {
      color: #3b82f6;
      border-color: rgba(59, 130, 246, 0.15);
      background: rgba(59, 130, 246, 0.03);
    }

    .meta-badge.pattern {
      color: #ec4899;
      border-color: rgba(236, 72, 153, 0.15);
      background: rgba(236, 72, 153, 0.03);
    }

    .flavor-desc {
      color: var(--text-secondary);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .tells-box {
      background: rgba(99, 102, 241, 0.03);
      border-left: 3px solid var(--accent-primary);
      padding: 0.5rem 1rem;
      border-radius: 0 6px 6px 0;
      font-size: 0.9rem;
      color: var(--text-primary);
    }
    .tells-box strong {
      color: var(--accent-primary);
    }

    /* Grid Layout split */
    .visualizer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    @media (max-width: 1024px) {
      .visualizer-grid {
        grid-template-columns: 1fr;
      }
      aside {
        display: none;
      }
      main {
        margin-left: 0;
        padding: 1.5rem;
      }
    }

    /* Timeline View Panel (Left Column) */
    .vis-panel {
      background: rgba(0, 0, 0, 0.1);
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .timeline-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-card);
      padding-bottom: 0.5rem;
    }

    /* Timeline step node card */
    .timeline-step {
      background: rgba(255,255,255,0.015);
      border: 1px solid var(--border-card);
      border-radius: 10px;
      padding: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-primary);
    }
    .step-action {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Canvas Row inside static state */
    .step-canvas {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70px;
      padding: 1rem 0;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 8px;
      border: 1px dashed var(--border-card);
    }

    .step-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.45;
    }

    /* Cell Renderings */
    .array-row {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      position: relative;
    }

    .array-cell {
      width: 40px;
      height: 40px;
      background-color: var(--cell-bg);
      border: 1px solid var(--cell-border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--cell-text);
      position: relative;
    }

    /* LinkedList visual connectors */
    .linked-node {
      display: flex;
      align-items: center;
    }
    .node-arrow {
      width: 18px;
      height: 2px;
      background: var(--text-muted);
      position: relative;
      margin: 0 0.15rem;
    }
    .node-arrow::after {
      content: '';
      position: absolute;
      right: 0;
      top: -3px;
      width: 6px;
      height: 6px;
      border-top: 2px solid var(--text-muted);
      border-right: 2px solid var(--text-muted);
      transform: rotate(45deg);
    }

    /* Hash Map visualization box */
    .hash-map-box {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      background: rgba(0,0,0,0.15);
      border: 1px solid var(--border-card);
      border-radius: 6px;
      padding: 0.5rem;
      margin-left: 0.75rem;
      min-width: 130px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }
    .hash-map-title {
      font-weight: bold;
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.65rem;
      margin-bottom: 0.15rem;
      border-bottom: 1px solid var(--border-card);
      padding-bottom: 0.15rem;
    }
    .hash-map-row {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      color: var(--text-secondary);
    }
    .map-key {
      color: var(--pointer-l);
    }
    .map-val {
      color: var(--pointer-r);
    }

    /* Active Cell States */
    .array-cell.active {
      background-color: var(--cell-active);
      border-color: var(--accent-primary);
    }
    .array-cell.swapped {
      background-color: var(--cell-swap);
      border-color: var(--pointer-mid);
    }
    .array-cell.success {
      background-color: var(--cell-success);
      border-color: var(--pointer-l);
    }

    /* Absolute Pointer positions nested inside cells */
    .pointer-tag {
      position: absolute;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 700;
      color: white;
      padding: 1px 4px;
      border-radius: 3px;
      transform: translateX(-50%);
      left: 50%;
      z-index: 5;
      white-space: nowrap;
    }
    
    .pointer-tag.top {
      top: -18px;
    }
    .pointer-tag.bottom {
      bottom: -18px;
    }

    .pointer-tag.top::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 4px 4px 0;
      border-style: solid;
      border-color: inherit;
    }
    
    .pointer-tag.bottom::after {
      content: '';
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 0 4px 4px;
      border-style: solid;
      border-color: inherit;
    }

    /* Pointer themes */
    .ptr-l { background-color: var(--pointer-l); border-color: var(--pointer-l); }
    .ptr-r { background-color: var(--pointer-r); border-color: var(--pointer-r); }
    .ptr-mid { background-color: var(--pointer-mid); border-color: var(--pointer-mid); }
    .ptr-slow { background-color: var(--pointer-slow); border-color: var(--pointer-slow); }
    .ptr-fast { background-color: var(--pointer-fast); border-color: var(--pointer-fast); }

    /* Code Panel & Highlighting */
    .code-panel {
      background: #0f1420;
      border: 1px solid var(--border-card);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .code-header {
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border-card);
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
      color: var(--text-muted);
      align-items: center;
    }

    .code-lang {
      font-weight: 600;
      font-family: var(--font-mono);
      text-transform: uppercase;
      color: var(--accent-primary);
    }

    .code-pre {
      padding: 1rem;
      overflow-x: auto;
      margin: 0;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      line-height: 1.45;
      color: #e2e8f0;
    }

    /* Code syntax */
    .kw { color: #f43f5e; font-weight: 500; }
    .typ { color: #3b82f6; }
    .fun { color: #10b981; }
    .str { color: #eab308; }
    .num { color: #ec4899; }
    .com { color: #6b7280; font-style: italic; }

    /* Leetcode Links */
    .leetcode-footer {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 0.25rem;
    }
    .leetcode-link {
      color: var(--accent-primary);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.2rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      background: var(--accent-glow);
      border: 1px solid rgba(99, 102, 241, 0.1);
      transition: all 0.2s;
    }
    .leetcode-link:hover {
      background: var(--accent-primary);
      color: white;
    }

    /* Matrix layout */
    .matrix-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 16px;
      padding: 1.5rem;
      overflow-x: auto;
    }

    .matrix-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.85rem;
    }

    .matrix-table th {
      padding: 0.75rem;
      border-bottom: 2px solid var(--border-card);
      color: var(--text-primary);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }

    .matrix-table td {
      padding: 1rem 0.75rem;
      border-bottom: 1px solid var(--border-card);
      color: var(--text-secondary);
      line-height: 1.45;
    }

    .matrix-table tr:hover {
      background: rgba(255,255,255,0.01);
    }

    .matrix-name {
      font-weight: 700;
      color: var(--text-primary);
    }
  </style>
</head>
<body>

  <!-- Theme Toggle Button -->
  <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle theme">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-icon"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <!-- Sidebar Layout -->
  <aside>
    <div class="brand">
      <div class="brand-icon">DS</div>
      <div class="brand-title">DSA Revision Hub</div>
    </div>
    
    <!-- Topic Navigation Selector -->
    <div class="sidebar-widget">
      <div class="widget-title">Select Topic</div>
      <ul class="nav-list" id="topicList">
        <li class="nav-item active" data-topic="two-pointers">
          <button>🛠️ Two Pointers</button>
        </li>
        <li class="nav-item" data-topic="binary-search">
          <button>🔍 Binary Search</button>
        </li>
        <li class="nav-item" data-topic="sliding-window">
          <button>📦 Sliding Window</button>
        </li>
        <li class="nav-item" data-topic="hashing">
          <button>🔑 Hashing Reference</button>
        </li>
      </ul>
    </div>

    <!-- View Toggle Tab Menu -->
    <div class="view-selector">
      <button class="view-tab-btn active" data-view="dashboard">Dashboard</button>
      <button class="view-tab-btn" data-view="matrix">Matrix</button>
    </div>

    <!-- Filter Widget (Only active in dashboard) -->

      const topic = TOPICS[activeTopic];
      
      // Update header
      topicTitle.textContent = `${topic.name} Dashboard`;
      topicDesc.textContent = topic.desc;
      matrixTitle.textContent = `${topic.name} Comparison Matrix`;
      
      // Render components
      renderCards();
      renderMatrix();
      renderTags();
    }

    // Helper: Syntax highlighter function
    function highlightCPP(code) {
      let escaped = code
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      
      const regex = /(\/\/.*)|(".*?"|'.*?')|(\b(?:int|void|vector|ListNode|string|char|bool|unordered_map|unordered_set|map|set|auto|size_t|INT_MAX|INT_MIN)\b)|(\b(?:for|while|if|else|return|continue|break|struct|const)\b)|(\b(?:twoSum|moveZeroes|merge|middleNode|sortColors|binarySearch|lowerBound|feasible|longestUniqueSubstring|maxSubarraySum|freqCount|subarraySum|groupAnagrams|minSubArrayLen|size|swap|push_back|erase|count|begin|end|insert|sort)\b)|(\b\d+\b)/g;
      
      return escaped.replace(regex, (match, com, str, typ, kw, fun, num) => {
        if (com) return `<span class="com">${com}</span>`;
        if (str) return `<span class="str">${str}</span>`;
        if (typ) return `<span class="typ">${typ}</span>`;
        if (kw) return `<span class="kw">${kw}</span>`;
        if (fun) return `<span class="fun">${fun}</span>`;
        if (num) return `<span class="num">${num}</span>`;
        return match;
      });
    }

    // Render static step canvas nodes
    function renderStepCanvas(step) {
      let canvasHTML = `<div class="array-row">`;
      
      if (step.type === 'array' || step.type === 'list' || step.type === 'hash' || step.type === 'string') {
        step.elements.forEach((val, idx) => {
          let cellClass = "array-cell";
          if (step.active && step.active.includes(idx)) cellClass += " active";
          if (step.swapped && step.swapped.includes(idx)) cellClass += " swapped";
          if (step.success && step.success.includes(idx)) cellClass += " success";
          
          let pointerHTML = "";
          if (step.ptrs) {
            // Find pointers pointing to this index
            const matchingPtrs = step.ptrs.filter(p => p.index === idx);
            if (matchingPtrs.length > 0) {
              const names = matchingPtrs.map(p => p.name).join(',');
              const pClass = matchingPtrs[0].class;
              const pPos = matchingPtrs[0].pos;
              pointerHTML = `<span class="pointer-tag ${pPos} ${pClass}">${names}</span>`;
            }
          }
          
          if (step.type === 'list') {
            canvasHTML += `<div class="linked-node">
              <div class="${cellClass}">${val}${pointerHTML}</div>`;
            if (idx < step.elements.length - 1) {
              canvasHTML += `<div class="node-arrow"></div>`;
            }
            canvasHTML += `</div>`;
          } else {
            canvasHTML += `<div class="${cellClass}">${val}${pointerHTML}</div>`;
          }
        });
        
        canvasHTML += `</div>`;
        
        // Append map if present
        if (step.type === 'hash' && step.map) {
          canvasHTML += `<div class="hash-map-box">
            <div class="hash-map-title">Map State</div>`;
          if (step.map.length === 0) {
            canvasHTML += `<div style="color:var(--text-muted); font-style:italic;">empty</div>`;
          } else {
            step.map.forEach(kv => {
              canvasHTML += `<div class="hash-map-row">
                <span class="map-key">${kv.key}:</span>
                <span class="map-val">${kv.val}</span>
              </div>`;
            });
          }
          canvasHTML += `</div>`;
        }
      }
      
      // Render merge type double array
      else if (step.type === 'double-array') {
        canvasHTML += `<div style="display:flex; flex-direction:column; gap:1.25rem; align-items:center;">
          <!-- Array A -->
          <div class="array-row">
            <div style="font-family:var(--font-mono); font-size:0.75rem; width:20px; color:var(--text-muted)">a:</div>`;
        step.elementsA.forEach((val, idx) => {
          let cellClass = "array-cell";
          if (step.activeA && step.activeA.includes(idx)) cellClass += " active";
          if (step.successA && step.successA.includes(idx)) cellClass += " success";
          
          let pointerHTML = "";
          const matchingPtrs = step.ptrsA.filter(p => p.index === idx);
          if (matchingPtrs.length > 0) {
            const names = matchingPtrs.map(p => p.name).join(',');
            pointerHTML = `<span class="pointer-tag ${matchingPtrs[0].pos} ${matchingPtrs[0].class}">${names}</span>`;
          }
          canvasHTML += `<div class="${cellClass}">${val}${pointerHTML}</div>`;
        });
        canvasHTML += `</div>
          <!-- Array B -->
          <div class="array-row" style="margin-left: 20px;">
            <div style="font-family:var(--font-mono); font-size:0.75rem; width:20px; color:var(--text-muted)">b:</div>`;
        step.elementsB.forEach((val, idx) => {
          let cellClass = "array-cell";
          if (step.activeB && step.activeB.includes(idx)) cellClass += " active";
          
          let pointerHTML = "";
          const matchingPtrs = step.ptrsB.filter(p => p.index === idx);
          if (matchingPtrs.length > 0) {
            const names = matchingPtrs.map(p => p.name).join(',');
            pointerHTML = `<span class="pointer-tag ${matchingPtrs[0].pos} ${matchingPtrs[0].class}">${names}</span>`;
          }
          canvasHTML += `<div class="${cellClass}">${val}${pointerHTML}</div>`;
        });
        canvasHTML += `</div></div>`;
      }
      
      return canvasHTML;
    }

    // Render Flavor/Template cards
    function renderCards() {
      cardsContainer.innerHTML = "";
      const topic = TOPICS[activeTopic];
      
      const query = searchInput.value.toLowerCase();
      
      // Determine active filter tag
      let activeTag = 'all';
      const activeTagBtn = tagList.querySelector('.tag-btn.active');
      if (activeTagBtn) activeTag = activeTagBtn.getAttribute('data-tag');

      topic.flavors.forEach(f => {
        // Search filter matching
        const matchQuery = f.name.toLowerCase().includes(query) || f.desc.toLowerCase().includes(query) || f.tells.toLowerCase().includes(query);
        const matchTag = activeTag === 'all' || f.pattern.toLowerCase() === activeTag;
        
        if (!matchQuery || !matchTag) return;

        // Code elements formatting
        const highlightedCode = highlightCPP(f.code);
        
        // Render timeline steps markup
        let stepsHTML = "";
        f.timeline.forEach(step => {
          stepsHTML += `
            <div class="timeline-step">
              <div class="step-header">
                <span>${step.title}</span>
                <span class="step-action">${step.action}</span>
              </div>
              <div class="step-canvas">
                ${renderStepCanvas(step)}
              </div>
              <div class="step-desc">${step.msg}</div>
            </div>
          `;
        });

        // Leetcode Links
        let linksHTML = "";
        f.leetcode.forEach(link => {
          linksHTML += `<a href="${link.url}" target="_blank" rel="noopener" class="leetcode-link">${link.name}</a>`;
        });

        // Full card card elements
        const card = document.createElement('section');
        card.className = "flavor-card";
        card.innerHTML = `
          <div class="flavor-meta">
            <span class="flavor-num">${f.num}</span>
            <h2 class="flavor-title">${f.name}</h2>
            <span class="meta-badge complexity">${f.complexity}</span>
            <span class="meta-badge pattern">${f.pattern}</span>
          </div>
          <div class="flavor-desc">${f.desc}</div>
          <div class="tells-box">
            <strong>Tells:</strong> ${f.tells}
          </div>
          
          <div class="visualizer-grid">
            <!-- Left: Static Timeline Panel -->
            <div class="vis-panel">
              <div class="timeline-title">Visual Step Timeline</div>
              ${stepsHTML}
            </div>

            <!-- Right: Code Panel -->
            <div class="code-panel">
              <div class="code-header">
                <span class="code-lang">C++ Template</span>
              </div>
              <pre class="code-pre"><code>${highlightedCode}</code></pre>
            </div>
          </div>

          <div class="leetcode-footer">
            <span style="font-size:0.8rem; color:var(--text-muted); font-weight:600;">Practice:</span>
            ${linksHTML}
          </div>
        `;
        cardsContainer.appendChild(card);
      });
      
      if (cardsContainer.children.length === 0) {
        cardsContainer.innerHTML = `<div style="text-align:center; padding:3rem; color:var(--text-muted); font-style:italic;">No matching templates found for this filter.</div>`;
      }
    }

    // Render Matrix tables
    function renderMatrix() {
      matrixContainer.innerHTML = "";
      const topic = TOPICS[activeTopic];
      
      let tableRows = "";
      topic.matrix.forEach(row => {
        tableRows += `
          <tr>
            <td class="matrix-name">${row.flavor}</td>
            <td>${row.movement}</td>
            <td>${row.preconditions}</td>
            <td>${row.complexity}</td>
            <td>${row.usecase}</td>
          </tr>
        `;
      });

      const tableHTML = `
        <table class="matrix-table" aria-label="Comparison Table">
          <thead>
            <tr>
              <th scope="col">Variation / Template</th>
              <th scope="col">Movement Behavior</th>
              <th scope="col">Preconditions</th>
              <th scope="col">Complexity</th>
              <th scope="col">Typical Use Case</th>
            </tr>
          </thead>
          <tbody>
            ${tableRows}
          </tbody>
        </table>
      `;
      matrixContainer.innerHTML = tableHTML;
    }

    // Render filters list dynamically based on unique tags of the active topic
    function renderTags() {
      tagList.innerHTML = `<button class="tag-btn active" data-tag="all">All</button>`;
      const topic = TOPICS[activeTopic];
      
      // Collect unique tags
      const tags = new Set();
      topic.flavors.forEach(f => tags.add(f.pattern.toLowerCase()));
      
      tags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = "tag-btn";
        btn.setAttribute('data-tag', tag);
        btn.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
        tagList.appendChild(btn);
        
        btn.addEventListener('click', () => {
          tagList.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderCards();
        });
      });
      
      // Also register listener for the default 'All' button
      tagList.querySelector('[data-tag="all"]').addEventListener('click', (e) => {
        tagList.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        renderCards();
      });
    }

    // Search bar event triggers
    searchInput.addEventListener('input', renderCards);

    // Initial load boot
    loadActiveTopic();
  </script>
</body>
</html>
