<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --cream:#FBF5F2; --charcoal:#34302B; --sage:#C58A86; --gold:#C9A24B; --soft:#6f6a62; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  body{background:#ddd;font-family:'Lato',sans-serif;}
  .stage{display:flex;flex-direction:column;gap:40px;padding:40px;align-items:flex-start;}

  /* ---------- LOGO (1:1, circular-safe) ---------- */
  .logo{
    width:1000px;height:1000px;background:var(--cream);position:relative;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .logo .ring{position:absolute;inset:70px;border:3px solid rgba(201,162,75,.55);border-radius:50%;}
  .logo .ring2{position:absolute;inset:88px;border:1px solid rgba(52,48,43,.18);border-radius:50%;}
  .logo .top{display:flex;align-items:center;gap:18px;margin-bottom:30px;}
  .logo .top .l{width:70px;height:1.5px;background:var(--gold);}
  .logo .top .d{color:var(--gold);font-size:20px;}
  .logo .eyebrow{font-size:25px;letter-spacing:.42em;text-transform:uppercase;color:var(--sage);font-weight:700;margin-bottom:8px;}
  .logo h1{font-family:'Playfair Display',serif;font-weight:600;color:var(--charcoal);font-size:150px;line-height:.92;}
  .logo h1 .b{display:block;font-style:italic;color:var(--sage);}
  .logo .bottom{margin-top:34px;font-size:24px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);font-weight:700;}

  /* ---------- COVER (16:9, content centered/safe) ---------- */
  .cover{
    width:1600px;height:900px;position:relative;overflow:hidden;
    background:
      radial-gradient(circle at 14% 16%, rgba(197,138,134,.13), transparent 40%),
      radial-gradient(circle at 86% 84%, rgba(201,162,75,.16), transparent 42%),
      var(--cream);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  }
  .cover .frame{position:absolute;inset:46px;border:1px solid rgba(52,48,43,.16);}
  .cover .eyebrow{font-size:24px;letter-spacing:.42em;text-transform:uppercase;color:var(--sage);font-weight:700;margin-bottom:30px;}
  .cover h2{font-family:'Playfair Display',serif;font-weight:600;color:var(--charcoal);font-size:108px;line-height:1.04;}
  .cover h2 .it{font-style:italic;color:var(--sage);}
  .cover .rule{width:96px;height:2px;background:var(--gold);margin:34px 0;}
  .cover .sub{font-size:30px;letter-spacing:.04em;color:var(--soft);}
  .cover .sub b{color:var(--charcoal);font-weight:700;}
</style>
</head>
<body>
<div class="stage">

  <div class="logo" id="logo">
    <div class="ring"></div>
    <div class="ring2"></div>
    <div class="top"><span class="l"></span><span class="d">◆</span><span class="l"></span></div>
    <div class="eyebrow">Weddings</div>
    <h1>Bride<span class="b">Bestie</span></h1>
    <div class="bottom">Est. 2026</div>
  </div>

  <div class="cover" id="cover">
    <div class="frame"></div>
    <div class="eyebrow">Bride Bestie</div>
    <h2>Wedding planning,<br><span class="it">made simple.</span></h2>
    <div class="rule"></div>
    <div class="sub">Printable checklists · budget trackers · timelines &nbsp;·&nbsp; <b>bridebestie.com</b></div>
  </div>

</div>
</body>
</html>
