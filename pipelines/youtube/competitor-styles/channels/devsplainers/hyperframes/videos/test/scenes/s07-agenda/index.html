<!doctype html>
<!-- ============================================================================
  STATIC PASS · scene 07 · agenda
  Build the FINAL-FRAME look for row 7 of ../../storyboard.md.
  Rules: compose ONLY from kit atoms (kit/atoms.md) + tokens; NO motion this pass
  (leave the timeline empty — M3 adds it). Assets are root-relative "kit/..."
  and resolve through the ./kit symlink. Keep the watermark. Verify with:
    node verify/verify.mjs videos/test/scenes/s07-agenda
============================================================================ -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="stylesheet" href="kit/tokens.css" />
    <link rel="stylesheet" href="kit/atoms.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="kit/recipes.js"></script>
    <style>
      .title-block { position: absolute; top: 120px; left: 0; right: 0; text-align: center; }
      .agenda-stage { position: absolute; top: 320px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: var(--sp-2); width: 1100px; }
      .agenda-row { display: flex; align-items: center; justify-content: space-between; padding: var(--sp-2) 0; border-bottom: 1px solid var(--border); }
      .agenda-row:last-child { border-bottom: none; }
      .agenda-row .numbered-title { font-size: 38px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="1920" data-height="1080">
      <!-- chrome -->
      <div id="clip-watermark" class="clip" data-start="0" data-duration="12" data-track-index="0">
        <div class="watermark">&lt;devsplainers&gt;</div>
      </div>
      <!-- Track 1: Title -->
      <div id="clip-title" class="clip" data-start="0" data-duration="12" data-track-index="1">
        <div class="title-block">
          <p class="subtitle">ROADMAP</p>
          <h1 class="headline" style="margin-top: 10px;">WHAT WE WILL COVER</h1>
        </div>
      </div>
      <!-- Track 2: Agenda -->
      <div id="clip-body" class="clip" data-start="0" data-duration="12" data-track-index="2">
        <div class="agenda-stage">
          <!-- Row 1 -->
          <div class="agenda-row">
            <div class="numbered-title"><span class="num">01</span> WHAT AN ENCODER IS</div>
            <span class="pill is-blue">THE BASIS</span>
          </div>
          <!-- Row 2 -->
          <div class="agenda-row">
            <div class="numbered-title"><span class="num">02</span> WHY IT SEEMED IMPOSSIBLE</div>
            <span class="pill is-red">THE CHALLENGE</span>
          </div>
          <!-- Row 3 -->
          <div class="agenda-row">
            <div class="numbered-title"><span class="num">03</span> HOW GOOGLE DID IT</div>
            <span class="pill is-amber">THE SOLUTION</span>
          </div>
          <!-- Row 4 -->
          <div class="agenda-row">
            <div class="numbered-title"><span class="num">04</span> WHY IT RUNS ON YOUR LAPTOP</div>
            <span class="pill is-green">THE PAYOFF</span>
          </div>
          <!-- Row 5 -->
          <div class="agenda-row">
            <div class="numbered-title"><span class="num">05</span> WHERE MARKETING OVERREACHES</div>
            <span class="pill">THE REALITY</span>
          </div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Motion Pass Choreography
      R.slideIn(tl, '.watermark', 0.2, 'right', { dist: 24 });
      R.fadeUp(tl, '.title-block .subtitle', 0.2);
      R.fadeUp(tl, '.title-block .headline', 0.4);

      // Staggered Agenda Rows
      R.slideIn(tl, '.agenda-row:nth-child(1)', 1.0, 'left', { dist: 40 });
      R.popIn(tl, '.agenda-row:nth-child(1) .pill', 1.3);

      R.slideIn(tl, '.agenda-row:nth-child(2)', 2.2, 'left', { dist: 40 });
      R.popIn(tl, '.agenda-row:nth-child(2) .pill', 2.5);

      R.slideIn(tl, '.agenda-row:nth-child(3)', 3.4, 'left', { dist: 40 });
      R.popIn(tl, '.agenda-row:nth-child(3) .pill', 3.7);

      R.slideIn(tl, '.agenda-row:nth-child(4)', 4.6, 'left', { dist: 40 });
      R.popIn(tl, '.agenda-row:nth-child(4) .pill', 4.9);

      R.slideIn(tl, '.agenda-row:nth-child(5)', 5.8, 'left', { dist: 40 });
      R.popIn(tl, '.agenda-row:nth-child(5) .pill', 6.1);

      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
