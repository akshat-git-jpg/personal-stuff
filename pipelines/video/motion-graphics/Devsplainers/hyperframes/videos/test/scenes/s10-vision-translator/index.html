<!doctype html>
<!-- ============================================================================
  STATIC PASS · scene 10 · vision-translator
  Build the FINAL-FRAME look for row 10 of ../../storyboard.md.
  Rules: compose ONLY from kit atoms (kit/atoms.md) + tokens; NO motion this pass
  (leave the timeline empty — M3 adds it). Assets are root-relative "kit/..."
  and resolve through the ./kit symlink. Keep the watermark. Verify with:
    node verify/verify.mjs videos/test/scenes/s10-vision-translator
============================================================================ -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="stylesheet" href="kit/tokens.css" />
    <link rel="stylesheet" href="kit/atoms.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="kit/recipes.js"></script>
    <style>
      .title-block { position: absolute; top: 140px; left: 0; right: 0; text-align: center; }
      .diagram-stage { position: absolute; top: 440px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; }
      .caption-block { position: absolute; bottom: 140px; left: 0; right: 0; text-align: center; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="10" data-width="1920" data-height="1080">
      <!-- chrome -->
      <div id="clip-watermark" class="clip" data-start="0" data-duration="10" data-track-index="0">
        <div class="watermark">&lt;devsplainers&gt;</div>
      </div>

      <!-- Track 1: Section Label -->
      <div id="clip-section" class="clip" data-start="0" data-duration="10" data-track-index="1">
        <div class="section-label">1 WHAT'S AN ENCODER?</div>
      </div>

      <!-- Track 2: Title -->
      <div id="clip-title" class="clip" data-start="0" data-duration="10" data-track-index="2">
        <div class="title-block">
          <h1 class="headline">HIRING A <span class="blue">TRANSLATOR</span> FOR IMAGES</h1>
        </div>
      </div>

      <!-- Track 3: Diagram -->
      <div id="clip-diagram" class="clip" data-start="0" data-duration="10" data-track-index="3">
        <div class="diagram-stage">
          <div class="pipeline">
            <!-- Node 1: Photo Input -->
            <div class="node">
              <svg class="icon is-blue" viewBox="0 0 48 48" style="width: 100px; height: 100px;">
                <rect x="8" y="8" width="32" height="32" rx="4" fill="none" stroke="currentColor" stroke-width="2" />
                <path d="M10 34 L18 24 L26 32 L32 26 L40 34" fill="none" stroke="currentColor" stroke-width="2" />
                <circle cx="16" cy="16" r="3" fill="currentColor" />
              </svg>
              <span class="pill">PHOTO</span>
            </div>

            <!-- Connector 1 -->
            <svg class="link" viewBox="0 0 90 2" style="width: 90px; height: 2px;">
              <line class="connector is-blue" x1="0" y1="1" x2="90" y2="1" stroke="currentColor" stroke-width="2" />
            </svg>

            <!-- Node 2: Vision Encoder Card -->
            <div class="node">
              <div class="card is-blue" style="width: 260px;">
                <span class="tag">TRANSLATOR</span>
                <span class="title">VISION ENCODER</span>
                <div class="lines">
                  <i></i>
                  <i></i>
                </div>
              </div>
              <span class="pill is-blue" style="margin-top: 8px;">studies pixels</span>
            </div>

            <!-- Connector 2 -->
            <svg class="link" viewBox="0 0 90 2" style="width: 90px; height: 2px;">
              <line class="connector is-blue" x1="0" y1="1" x2="90" y2="1" stroke="currentColor" stroke-width="2" />
            </svg>

            <!-- Node 3: Paragraph Card -->
            <div class="node">
              <div class="card is-blue" style="width: 260px;">
                <span class="tag">ENGLISH</span>
                <span class="title">DESCRIPTION</span>
                <div class="lines">
                  <i></i>
                  <i></i>
                  <i></i>
                </div>
              </div>
              <span class="pill" style="margin-top: 8px;">reads text</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Track 4: Caption -->
      <div id="clip-caption" class="clip" data-start="0" data-duration="10" data-track-index="4">
        <div class="caption-block">
          <p class="caption">TRANSLATOR STUDIES THE IMAGE, WRITES A PARAGRAPH</p>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Motion Pass Choreography
      R.slideIn(tl, '.watermark', 0.2, 'right', { dist: 24 });
      R.fadeUp(tl, '.section-label', 0.2);
      R.fadeUp(tl, '#clip-title .headline', 0.3);

      // Pipeline entrance
      R.popIn(tl, '.pipeline > .node:nth-child(1)', 0.8);
      R.drawOn(tl, '.pipeline > .link:nth-of-type(1) .connector', 1.4);
      R.popIn(tl, '.pipeline > .node:nth-child(3)', 2.0);
      R.drawOn(tl, '.pipeline > .link:nth-of-type(2) .connector', 2.6);
      R.popIn(tl, '.pipeline > .node:nth-child(5)', 3.2);

      // Caption
      R.fadeUp(tl, '#clip-caption .caption', 3.8);

      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
