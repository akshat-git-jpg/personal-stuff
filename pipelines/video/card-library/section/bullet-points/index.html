<!doctype html>
<!--
  BULLET POINTS   (Hyperframes card)
  Plain numbered agenda for the start of a video — no highlight, no ticks.
  Every item renders the same: number 1,2,3,4 + label, full opacity.
  1920x1080, 30fps, 6 seconds.

  ┌─────────────────────────────────────────────────────────────────────────┐
  │  EDITOR: edit only the  ===== CONTENT =====  block + :root.               │
  │  Never touch the TIMELINE.                                                │
  └─────────────────────────────────────────────────────────────────────────┘

  Render:  npx hyperframes@latest render section/bullet-points -o out.mp4 --fps 30
  Override: --variables '{"eyebrow":"What we'll cover","items":[{"label":"A"},{"label":"B"},{"label":"C"}]}'
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* ===== THEME (editor may change these colors) ===== */
      :root {
        --bg-from: #3a1f08; --bg-to: #0a0805;
        --text: #ffffff; --accent: #fb923c;
        --font: 'Inter', 'Helvetica Neue', Arial, system-ui, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; font-family: var(--font); color: var(--text); }
      #root { position: relative; width: 1920px; height: 1080px; }
      #bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, var(--bg-from) 0%, var(--bg-to) 60%); }

      #content { position: absolute; inset: 0; padding: 130px 200px; display: flex; align-items: center; justify-content: center; }
      #inner { display: flex; flex-direction: column; gap: 30px; max-width: 1500px; width: 100%; }
      .eyebrow { font-size: 22px; font-weight: 700; letter-spacing: 6px; color: var(--accent); text-transform: uppercase; will-change: transform, opacity; }
      ol { list-style: none; display: flex; flex-direction: column; gap: 14px; }

      .row { position: relative; display: flex; align-items: center; gap: 32px; padding: 16px 30px; border-radius: 18px; will-change: transform, opacity; }
      .num { font-variant-numeric: tabular-nums; font-size: 40px; font-weight: 600; min-width: 70px; text-align: center; color: var(--accent); will-change: transform, opacity; }
      .label { font-size: 54px; font-weight: 600; letter-spacing: -1.5px; line-height: 1.1; color: var(--text); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="bullet-points" data-start="0" data-duration="6" data-width="1920" data-height="1080"
      data-composition-variables='{"eyebrow":"What we&apos;ll cover","items":[{"label":"Eliminated — and why"},{"label":"Situational picks"},{"label":"Worth considering"},{"label":"The four winners"}]}'>
      <div id="bg" class="clip" data-start="0" data-duration="6" data-track-index="0"></div>
      <div id="content" class="clip" data-start="0" data-duration="6" data-track-index="1">
        <div id="inner">
          <div class="eyebrow" id="eyebrow"></div>
          <ol id="list"></ol>
        </div>
      </div>
    </div>

    <script>
      /* ===== CONTENT ===== */
      const VARS = (window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : null) || {};
      const DATA = {
        eyebrow: VARS.eyebrow ?? "What we'll cover",
        items: VARS.items ?? [
          { label: 'Eliminated — and why' },
          { label: 'Situational picks' },
          { label: 'Worth considering' },
          { label: 'The four winners' },
        ],
      };

      /* ===== TIMELINE (LOCKED) ===== */
      const $ = (id) => document.getElementById(id);
      $('eyebrow').textContent = DATA.eyebrow;
      $('list').innerHTML = DATA.items
        .map((it, i) => `<li class="row"><span class="num">${String(i + 1)}</span><span class="label">${it.label}</span></li>`)
        .join('');

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      // eyebrow slides in, then the list rows stagger in
      tl.from('#eyebrow', { opacity: 0, y: -14, duration: 0.45, ease: 'power3.out' }, 0.05);
      tl.from('#list .row', { opacity: 0, x: -28, duration: 0.5, ease: 'power3.out', stagger: 0.08 }, 0.2);
      window.__timelines['bullet-points'] = tl;
    </script>
  </body>
</html>
