<!doctype html>
<!--
  TOOL INTRO   (Hyperframes card)
  Section opener for one tool/product.
  1920x1080, 30fps, 6 seconds.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --bg-from: #3a1f08; --bg-to: #0a0805;
        --text: #ffffff; --text-dim: rgba(255, 239, 219, 0.6);
        --accent: #fb923c;
        --font: 'Inter', system-ui, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; font-family: var(--font); color: var(--text); }
      #root { position: relative; width: 1920px; height: 1080px; }
      #bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, var(--bg-from) 0%, var(--bg-to) 60%); }
      #frame { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 120px; }
      .progress { font-size: 20px; font-weight: 800; text-transform: uppercase; color: var(--accent); letter-spacing: 2px; position: absolute; top: 110px; left: 120px; }
      .content { display: flex; flex-direction: column; align-items: flex-start; max-width: 1560px; }
      .name { font-size: 130px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
      .tagline { font-size: 32px; color: var(--text-dim); margin-top: 16px; max-width: 1200px; line-height: 1.4; }
      .chip { margin-top: 32px; padding: 12px 24px; border: 2px solid var(--accent); border-radius: 999px; color: var(--accent); font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="toolintro" data-start="0" data-duration="6" data-width="1920" data-height="1080"
      data-composition-variables='{"index":2,"total":5,"name":"Higgsfield","tagline":"Video-first platform built around cinematic quality and camera control","tag":"Cinematic video"}'>
      <div id="bg" class="clip" data-start="0" data-duration="6" data-track-index="0"></div>
      <div id="frame" class="clip" data-start="0" data-duration="6" data-track-index="1">
        <div class="progress" id="progress"></div>
        <div class="content">
          <div class="name" id="name"></div>
          <div class="tagline" id="tagline"></div>
          <div class="chip" id="chip"></div>
        </div>
      </div>
    </div>
    <script>
      /* ===== CONTENT ===== */
      const VARS = (window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : null) || {};
      const DATA = {
        index: VARS.index ?? 2,
        total: VARS.total ?? 5,
        name: VARS.name ?? 'Higgsfield',
        tagline: VARS.tagline ?? 'Video-first platform built around cinematic quality and camera control',
        tag: VARS.tag ?? 'Cinematic video',
      };
      
      document.getElementById('progress').textContent = `TOOL ${DATA.index} OF ${DATA.total}`;
      document.getElementById('name').textContent = DATA.name;
      document.getElementById('tagline').textContent = DATA.tagline;
      document.getElementById('chip').textContent = DATA.tag;

      /* ===== TIMELINE (LOCKED) ===== */
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      
      tl.from('#progress', { opacity: 0, duration: 0.5, ease: 'power2.out' }, 0.1);
      tl.from('#name', { opacity: 0, y: 24, duration: 0.6, ease: 'power3.out' }, 0.2);
      tl.from('#tagline', { opacity: 0, y: 16, duration: 0.6, ease: 'power3.out' }, 0.35);
      tl.from('#chip', { opacity: 0, scale: 0.8, duration: 0.5, ease: 'back.out(1.6)' }, 0.8);

      window.__timelines['toolintro'] = tl;
    </script>
  </body>
</html>
