<!doctype html>
<!--
  SUMMARY TABLE   (Hyperframes card)
  Scored comparison matrix: factors (rows) x products (columns), score cells plus a
  Reason column explaining each row. Airy, borderless — matches feature-matrix's
  house style (hairline row dividers, transparent cells, orange eyebrow label).
  1920x1080, 30fps, 7 seconds.

  EDITOR: edit only ===== CONTENT ===== (products[], features[]) + :root, never TIMELINE.
  Render:  npx hyperframes@latest render comparison/summary-table -o out.mp4 --fps 30
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Summary Table</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --bg-from: #3a1f08; --bg-to: #0a0805;
        --text: #ffffff; --text-dim: rgba(255, 239, 219, 0.55);
        --accent: #fb923c;
        --font: 'Inter', system-ui, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; font-family: var(--font); color: var(--text); }
      #root { position: relative; width: 1920px; height: 1080px; }
      #bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, var(--bg-from) 0%, var(--bg-to) 60%); }

      #frame { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 96px 120px; }
      #content-wrapper { width: 100%; max-width: 1680px; display: flex; flex-direction: column; gap: 44px; }

      /* title: accent mark + heading, real gap, sentence case (no emoji, no all-caps) */
      .slide-title { display: flex; align-items: center; gap: 20px; align-self: flex-start; will-change: transform, opacity; }
      .slide-title .mark { width: 26px; height: 26px; border-radius: 7px; background: var(--accent); flex: none; box-shadow: 0 0 26px rgba(251, 146, 60, 0.5); }
      .slide-title .title-text { font-size: 40px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }

      #table { width: 100%; }
      .grid { display: grid; gap: 0; width: 100%; }
      .cell { padding: 22px 22px; display: flex; align-items: center; }

      /* header row: product names white/bold; label columns are orange eyebrows */
      .hcell { font-size: 28px; font-weight: 800; justify-content: center; color: var(--text); }
      .hcell.feat, .hcell.reason { justify-content: flex-start; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; font-size: 19px; font-weight: 800; }

      /* body rows: hairline top divider, transparent (no boxes, no striping) */
      .frow .cell { border-top: 1px solid rgba(255, 255, 255, 0.08); }
      .feat { justify-content: flex-start; font-size: 25px; font-weight: 700; color: var(--accent); }
      .val { justify-content: center; font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text); }
      .val.txt { justify-content: flex-start; color: var(--text-dim); font-size: 19px; font-weight: 500; line-height: 1.45; text-align: left; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="summary-table" data-start="0" data-duration="7" data-width="1920" data-height="1080"
      data-composition-variables='{"products":["OpenArt","Higgsfield","Synthesia","HeyGen","Arcads"],"beats":[{"name":"Ease of Use","values":["3.5 / 5","4 / 5","5 / 5","4.5 / 5","4 / 5","Synthesia is the most beginner-friendly. HeyGen close behind. OpenArt takes a session or two to get comfortable with."],"at":0.6},{"name":"Features","values":["5 / 5","3.5 / 5","3.5 / 5","3.5 / 5","3 / 5","OpenArt covers the most creative ground. Arcads scores lower — intentionally focused on one output type."],"at":0.74},{"name":"Output Quality","values":["4.5 / 5","4.5 / 5","4 / 5","4 / 5","4 / 5","OpenArt & Higgsfield tie at top. All five produce results you can actually use."],"at":0.88},{"name":"Use Case Fit","values":["5 / 5","3.5 / 5","5 / 5","5 / 5","5 / 5","Four tools are best-in-class for their niche. Higgsfield&#39;s cinematic focus serves a narrower range of creators."],"at":1.02},{"name":"Pricing & Value","values":["4.5 / 5","3.5 / 5","3.5 / 5","4 / 5","3.5 / 5","OpenArt leads — most creative ground per dollar. HeyGen strong for solo creators. Arcads premium only makes sense at volume."],"at":1.16}]}'>
      <div id="bg" class="clip" data-start="0" data-duration="7" data-track-index="0"></div>
      <div id="frame" class="clip" data-start="0" data-duration="7" data-track-index="1">

        <div id="content-wrapper">
          <div class="slide-title" id="title-header">
            <span class="mark"></span>
            <span class="title-text">Summary Table</span>
          </div>

          <div id="table">
            <div class="grid" id="grid"></div>
          </div>
        </div>

      </div>
    </div>

    <script>
      /* ===== CONTENT ===== */
      const VARS = (window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : null) || {};
      const DATA = {
        products: VARS.products ?? ['OpenArt', 'Higgsfield', 'Synthesia', 'HeyGen', 'Arcads'],
        beats: VARS.beats ?? [
          { name: 'Ease of Use', values: ['3.5 / 5', '4 / 5', '5 / 5', '4.5 / 5', '4 / 5', 'Synthesia is the most beginner-friendly. HeyGen close behind. OpenArt takes a session or two to get comfortable with.'], at: 0.6 },
          { name: 'Features', values: ['5 / 5', '3.5 / 5', '3.5 / 5', '3.5 / 5', '3 / 5', 'OpenArt covers the most creative ground. Arcads scores lower — intentionally focused on one output type.'], at: 0.74 },
          { name: 'Output Quality', values: ['4.5 / 5', '4.5 / 5', '4 / 5', '4 / 5', '4 / 5', 'OpenArt & Higgsfield tie at top. All five produce results you can actually use.'], at: 0.88 },
          { name: 'Use Case Fit', values: ['5 / 5', '3.5 / 5', '5 / 5', '5 / 5', '5 / 5', "Four tools are best-in-class for their niche. Higgsfield's cinematic focus serves a narrower range of creators."], at: 1.02 },
          { name: 'Pricing & Value', values: ['4.5 / 5', '3.5 / 5', '3.5 / 5', '4 / 5', '3.5 / 5', 'OpenArt leads — most creative ground per dollar. HeyGen strong for solo creators. Arcads premium only makes sense at volume.'], at: 1.16 },
        ],
      };

      const grid = document.getElementById('grid');

      function build() {
        grid.style.gridTemplateColumns = `1.3fr repeat(${DATA.products.length}, 1fr) 2.4fr`;

        let html = '<div class="hrow" style="display:contents">';
        html += '<div class="cell hcell feat">Factor</div>';
        html += DATA.products.map(() => '<div class="cell hcell"></div>').join('');
        html += '<div class="cell hcell reason">Reason</div>';
        html += '</div>';

        DATA.beats.forEach((f, i) => {
          html += `<div class="frow" id="frow-${i}" style="display:contents">`;
          html += '<div class="cell feat"></div>';
          for (let j = 0; j < f.values.length - 1; j++) {
            html += '<div class="cell val"></div>';
          }
          html += '<div class="cell val txt"></div>';
          html += `</div>`;
        });

        grid.innerHTML = html;

        grid.querySelectorAll('.hrow .cell.hcell:not(.feat):not(.reason)').forEach((el, i) => {
          el.textContent = DATA.products[i];
        });
        DATA.beats.forEach((f, i) => {
          const cells = document.getElementById(`frow-${i}`).children;
          cells[0].textContent = f.name;
          f.values.forEach((v, j) => { cells[j + 1].textContent = v; });
        });
      }
      build();

      /* ===== TIMELINE (LOCKED) ===== */
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from('#title-header', { opacity: 0, y: -20, duration: 0.4, ease: 'power2.out' }, 0.1);
      tl.from('.hrow .cell', { opacity: 0, y: -25, duration: 0.5, ease: 'power3.out', stagger: 0.04 }, 0.3);
      DATA.beats.forEach((f, i) => {
        tl.from(`#frow-${i} .cell`, { opacity: 0, x: -30, duration: 0.5, ease: 'power2.out', stagger: 0.02 }, f.at);
      });

      window.__timelines['summary-table'] = tl;
    </script>
  </body>
</html>
