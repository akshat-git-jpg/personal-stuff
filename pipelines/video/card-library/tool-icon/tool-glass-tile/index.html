<!doctype html>
<!--
  TOOL ICON CARD · Glass Tile   (Hyperframes card)
  A glassy iOS-style rounded-square app-icon tile centered, holding a muted brand
  logo, with the tool name beneath the tile and an optional one-line subtitle.
  1920x1080, 30fps.

  ┌─────────────────────────────────────────────────────────────────────────┐
  │  EDITOR: you ONLY ever touch the  ===== CONTENT =====  block and the      │
  │  :root  colors below. Change logo / name / subtitle  there. Do NOT      │
  │  touch the  ===== TIMELINE (LOCKED) =====  script — that's the motion.    │
  │  Ask Gemini: "only change DATA and :root, never the timeline."            │
  └─────────────────────────────────────────────────────────────────────────┘

  Render:  npx hyperframes@latest render tool-icon/tool-glass-tile -o out.mp4 --fps 30
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Tool Hero.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* ===== THEME (editor may change these colors) ===== */
      :root {
        --bg-from: #3a1f08;   /* radial origin (burnt amber) */
        --bg-to: #0a0805;     /* near-black warm undertone */
        --text: #ffffff;
        --text-dim: rgba(255, 239, 219, 0.62);
        --accent: #fb923c;
        --font: 'Inter', 'Helvetica Neue', Arial, system-ui, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; font-family: var(--font); color: var(--text); }
      #root { position: relative; width: 1920px; height: 1080px; }

      #bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 24%, var(--bg-from) 0%, var(--bg-to) 64%); }
      
      /* soft accent glow behind the tile */
      #glow { position: absolute; inset: 0; background: radial-gradient(ellipse 40% 40% at 50% 40%, color-mix(in srgb, var(--accent) 15%, transparent) 0%, transparent 60%); will-change: opacity; }

      #frame { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 90px; }

      #tile { 
        width: 300px; height: 300px; border-radius: 64px; 
        background: rgba(255, 255, 255, 0.06); 
        border: 1px solid rgba(255, 255, 255, 0.14); 
        backdrop-filter: blur(3px);
        box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.05), 0 20px 60px rgba(0, 0, 0, 0.3);
        display: flex; align-items: center; justify-content: center;
        will-change: transform, opacity;
        margin-bottom: 30px;
      }

      #logo { width: 150px; height: 150px; object-fit: contain; filter: saturate(0.5) brightness(0.95); opacity: 0.9; will-change: transform, opacity; }

      #name { font-size: 56px; font-weight: 800; color: #ffffff; will-change: transform, opacity; }
      #subtitle { font-size: 32px; font-weight: 500; color: var(--text-dim); margin-top: 10px; will-change: opacity; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="toolicon" data-start="0" data-duration="6" data-width="1920" data-height="1080"
      data-composition-variables='{"logo":"opusclip","name":"word"}'>
      <!-- Track 0: background -->
      <div id="bg" class="clip" data-start="0" data-duration="6" data-track-index="0"></div>
      <!-- Track 1: accent glow -->
      <div id="glow" class="clip" data-start="0" data-duration="6" data-track-index="1"></div>
      <!-- Track 2: content -->
      <div id="frame" class="clip" data-start="0" data-duration="6" data-track-index="2">
        <div id="tile"><img id="logo" /></div>
        <div id="name"></div>
        <div id="subtitle"></div>
      </div>
    </div>

    <script>
      /* =====================================================
         ===== CONTENT =====  
         logo    : logos/ registry slug
         name    : tool name
         subtitle: optional subtitle line
         ===================================================== */
      const VARS = (window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : null) || {};
      const DATA = {
        logo: VARS.logo ?? 'openai',
        name: VARS.name ?? 'GPT Image 2',
        subtitle: VARS.subtitle ?? '',
      };

      /* ===== TIMELINE (LOCKED) ===== */
      const $ = (id) => document.getElementById(id);
      
      const LOGOS = VARS.__logos ?? {};
      const logoEl = $('logo');
      if (DATA.logo && LOGOS[DATA.logo]) { 
        logoEl.src = LOGOS[DATA.logo]; 
        logoEl.style.display = 'block'; 
      } else { 
        logoEl.remove(); 
      }

      $('name').textContent = DATA.name;
      if (DATA.subtitle) { 
        $('subtitle').textContent = DATA.subtitle; 
      } else { 
        $('subtitle').remove(); 
      }

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      
      tl.fromTo('#tile', { scale: 0.9, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.55, ease: 'back.out(1.6)' }, 0);
      tl.fromTo('#glow', { opacity: 0 }, { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.1);
      
      if ($('logo')) {
        tl.fromTo('#logo', { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 0.9, duration: 0.5, ease: 'power3.out' }, 0.25);
      }
      
      tl.fromTo('#name', { y: 18, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: 'power3.out' }, 0.45);
      
      if ($('subtitle')) {
        tl.fromTo('#subtitle', { opacity: 0 }, { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.65);
      }

      window.__timelines['toolicon'] = tl;
    </script>
  </body>
</html>
