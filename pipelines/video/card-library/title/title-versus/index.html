<!doctype html>
<!--
  TITLE CARD · Versus Comparison Opener
  Two large logo tiles side by side, product name beneath each, VS badge between.
  1920x1080, 30fps, 10 seconds.

  ┌─────────────────────────────────────────────────────────────────────────┐
  │  EDITOR: you ONLY ever touch the  ===== CONTENT =====  block and          │
  │  the  :root  colors below. Change title / platforms / colors there.       │
  │  Do NOT touch the  ===== TIMELINE (LOCKED) =====  script — that's the     │
  │  motion. Ask Gemini: "only change DATA and :root, never the timeline."    │
  └─────────────────────────────────────────────────────────────────────────┘
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* ===== THEME (editor may change these colors) ===== */
      :root {
        --bg-from: #3a1f08;
        --bg-to: #0a0805;
        --text: #ffffff;
        --accent: #fb923c;
        --accent-to: #c2410c;
        --win: #facc15;
        --chip-bg: rgba(255, 255, 255, 0.05);
        --chip-border: rgba(255, 255, 255, 0.14);
        --font: 'Inter', 'Helvetica Neue', Arial, system-ui, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: #000; font-family: var(--font); color: var(--text);
      }
      #root { position: relative; width: 1920px; height: 1080px; }

      #bg {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at 30% 20%, var(--bg-from) 0%, var(--bg-to) 60%);
      }
      #aurora { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
      .blob { position: absolute; filter: blur(60px); will-change: transform; }

      #frame {
        position: absolute; inset: 0; padding: 140px;
        display: flex; align-items: center; justify-content: center;
      }
      #content {
        display: flex; flex-direction: column; align-items: center; gap: 44px;
        max-width: 1700px; width: 100%;
      }

      #titleContainer {
        font-size: 44px; font-weight: 600; color: rgba(255, 255, 255, 0.85);
        will-change: transform, opacity;
      }

      #versusLockup {
        display: flex; align-items: center; justify-content: center;
        gap: 64px;
      }

      .platform-group {
        display: flex; flex-direction: column; align-items: center; gap: 40px;
      }

      .tile {
        position: relative;
        width: 360px; height: 360px; border-radius: 48px; background: var(--chip-bg);
        border: 1px solid var(--chip-border);
        display: flex; align-items: center; justify-content: center; padding: 42px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 22px 50px rgba(0, 0, 0, 0.38);
        will-change: transform, opacity;
      }
      .tile::before {
        content: ''; position: absolute; inset: 24%; border-radius: 32px;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.10) 0%, transparent 70%);
      }
      .tile svg, .tile img.logo {
        width: 60%; height: 60%; object-fit: contain; position: relative;
        filter: saturate(0.62) brightness(1.02); opacity: 0.95;
      }

      .logo-fallback {
        font-size: 80px; font-weight: 700; color: var(--text); position: relative;
      }

      .product-name {
        font-size: 64px; font-weight: 800; color: var(--text);
        will-change: transform, opacity;
      }

      .vs-badge {
        font-size: 40px; font-weight: 800; color: var(--accent);
        background: var(--chip-bg); border: 2px solid var(--chip-border);
        width: 100px; height: 100px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 12px 32px rgba(0,0,0,0.4);
        will-change: transform, opacity;
        flex-shrink: 0;
      }

      #versusLockup.multi .tile {
        width: 260px; height: 260px; border-radius: 36px; padding: 30px;
      }
      #versusLockup.multi .product-name {
        font-size: 44px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="title-versus"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
      data-composition-variables='{"title":"Which one ships faster","platforms":[{"name":"Submagic","logo":"submagic"},{"name":"OpusClip","logo":"opusclip"}]}'
    >
      <div id="bg" class="clip" data-start="0" data-duration="10" data-track-index="0"></div>
      <div id="aurora" class="clip" data-start="0" data-duration="10" data-track-index="1"></div>

      <div id="frame" class="clip" data-start="0" data-duration="10" data-track-index="2">
        <div id="content">
          <div id="titleContainer"></div>
          <div id="versusLockup"></div>
        </div>
      </div>
    </div>

    <script>
      /* =====================================================
         ===== CONTENT =====  (editor / Gemini edits ONLY this)
         ===================================================== */
      const VARS =
        (window.__hyperframes && window.__hyperframes.getVariables
          ? window.__hyperframes.getVariables()
          : null) || {};
      const PLATFORMS = [
        { name: "Submagic", logo: "submagic" },
        { name: "OpusClip", logo: "opusclip" }
      ];
      const DATA = {
        title: VARS.title,
        platforms: VARS.platforms ?? PLATFORMS,
      };

      /* =====================================================
         ===== TIMELINE (LOCKED — do not edit) =====
         ===================================================== */
      const $ = (id) => document.getElementById(id);

      const AURORA = [
        { baseX: 300,  baseY: 200, ampX: 80,  ampY: 40, color: '#fb923c', size: 600, opacity: 0.28 },
        { baseX: 1600, baseY: 800, ampX: 100, ampY: 60, color: '#facc15', size: 560, opacity: 0.18 },
        { baseX: 1200, baseY: 400, ampX: 140, ampY: 70, color: '#c2410c', size: 520, opacity: 0.22 },
      ];

      const LOGOS = VARS.__logos ?? {};
      function build() {
        if (DATA.title) {
          $('titleContainer').innerHTML = `<div id="titleText">${DATA.title}</div>`;
        } else {
          $('titleContainer').innerHTML = '';
        }

        const isMulti = DATA.platforms.length > 2;
        const lockup = $('versusLockup');
        if (isMulti) lockup.classList.add('multi');

        const els = [];
        DATA.platforms.forEach((p, i) => {
          const src = LOGOS[p.logo];
          const logoHtml = src
            ? `<img class="logo" src="${src}" alt="">`
            : `<span class="logo-fallback">${(p.name || '?')[0]}</span>`;

          els.push(`
            <div class="platform-group">
              <div class="tile">${logoHtml}</div>
              <div class="product-name">${p.name || ''}</div>
            </div>
          `);

          if (i < DATA.platforms.length - 1 && !isMulti) {
            els.push(`<div class="vs-badge">VS</div>`);
          }
        });
        lockup.innerHTML = els.join('');

        $('aurora').innerHTML = AURORA.map(
          (b) =>
            `<div class="blob" style="left:${b.baseX - b.size / 2}px;top:${b.baseY - b.size / 2}px;
              width:${b.size}px;height:${b.size}px;opacity:${b.opacity};
              background:radial-gradient(circle, ${b.color} 0%, transparent 60%);"></div>`,
        ).join('');
      }
      build();

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const blobs = gsap.utils.toArray('#aurora .blob');
      blobs.forEach((el, i) => {
        const b = AURORA[i];
        tl.to(
          el,
          { x: b.ampX, y: -b.ampY, duration: 5, ease: 'sine.inOut', yoyo: true, repeat: 1 },
          0,
        );
      });

      tl.from('.tile', { scale: 0.86, opacity: 0, duration: 0.6, ease: 'back.out(1.6)', stagger: 0.12 }, 0.10);

      if (document.querySelector('.vs-badge')) {
        tl.from('.vs-badge', { scale: 0.4, opacity: 0, duration: 0.5, ease: 'back.out(2.4)' }, 0.55);
      }

      tl.from('.product-name', { y: 18, opacity: 0, duration: 0.6, ease: 'power3.out', stagger: 0.08 }, 0.75);

      if (DATA.title) {
        tl.from('#titleContainer', { y: -14, opacity: 0, duration: 0.6, ease: 'power3.out' }, 0.95);
      }

      window.__timelines['title-versus'] = tl;
    </script>
  </body>
</html>
