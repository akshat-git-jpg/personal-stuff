<!doctype html>
<!--
  PERSONA MATCH   (Hyperframes card)
  Use-case verdict: persona -> winning tool pairs. The video's finale payoff:
  each row lands with an accent divider draw + gold winner chip pop + glow flash.
  1920x1080, 30fps, 7 seconds.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --bg-from: #3a1f08; --bg-to: #0a0805;
        --text: #ffffff;
        --text-dim: rgba(255, 239, 219, 0.6);
        --accent: #fb923c;
        --gold: #facc15;
        --font: 'Inter', system-ui, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; font-family: var(--font); color: var(--text); }
      #root { position: relative; width: 1920px; height: 1080px; }
      #bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, var(--bg-from) 0%, var(--bg-to) 60%); }
      #frame { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 110px 120px; }
      #eyebrow { font-size: 20px; font-weight: 700; letter-spacing: 7px; color: var(--accent); text-transform: uppercase; margin-bottom: 14px; will-change: transform, opacity; }
      #title { font-size: 66px; font-weight: 900; letter-spacing: -2px; margin-bottom: 46px; will-change: transform, opacity; }
      #rows { display: flex; flex-direction: column; gap: 18px; width: 100%; max-width: 1280px; }
      .row { position: relative; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 22px 44px; display: flex; align-items: center; overflow: hidden; will-change: transform, opacity; }
      .persona { font-size: 31px; font-weight: 600; white-space: nowrap; }
      .divider { flex: 1; height: 2px; margin: 0 36px; border-radius: 2px;
        background: linear-gradient(90deg, rgba(251,146,60,0), rgba(251,146,60,0.55));
        transform-origin: left center; will-change: transform; }
      .chip { display: flex; align-items: center; gap: 14px; background: rgba(250,204,21,0.07);
        border: 1px solid rgba(250,204,21,0.35); border-radius: 14px; padding: 10px 24px; will-change: transform, opacity; }
      .chip img { width: 30px; height: 30px; border-radius: 7px; object-fit: contain; display: none;
        filter: saturate(0.5) brightness(0.95); opacity: 0.9; }
      .winner { font-size: 29px; font-weight: 800; color: var(--gold); white-space: nowrap; }
      .glow { position: absolute; inset: 0; border-radius: 20px; opacity: 0; pointer-events: none;
        box-shadow: inset 0 0 46px rgba(250,204,21,0.26); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="personamatch" data-start="0" data-duration="7" data-width="1920" data-height="1080"
      data-composition-variables='{"title":"Which one is for you?","beats":[{"persona":"Content creators","winner":"OpenArt AI","at":0.6},{"persona":"Cinematic video","winner":"Higgsfield","at":1.5},{"persona":"Corporate &amp; L&amp;D","winner":"Synthesia","at":2.4},{"persona":"Solo creators","winner":"HeyGen","at":3.3},{"persona":"Performance marketers","winner":"Arcads","at":4.2}]}'>
      <div id="bg" class="clip" data-start="0" data-duration="7" data-track-index="0"></div>
      <div id="frame" class="clip" data-start="0" data-duration="7" data-track-index="1">
        <div id="eyebrow">The verdict</div>
        <div id="title"></div>
        <div id="rows"></div>
      </div>
    </div>
    <script>
      /* ===== CONTENT ===== */
      const VARS = (window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : null) || {};
      const DATA = {
        title: VARS.title ?? 'Which one is for you?',
        beats: VARS.beats ?? [
          { persona: 'Content creators', winner: 'OpenArt AI', at: 0.6 },
          { persona: 'Cinematic video', winner: 'Higgsfield', at: 1.5 },
          { persona: 'Corporate & L&D', winner: 'Synthesia', at: 2.4 },
          { persona: 'Solo creators', winner: 'HeyGen', at: 3.3 },
          { persona: 'Performance marketers', winner: 'Arcads', at: 4.2 },
        ],
      };
      document.getElementById('title').textContent = DATA.title;
      const rowsContainer = document.getElementById('rows');
      const els = [];
      const LOGOS = VARS.__logos ?? {};
      DATA.beats.forEach((b) => {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<span class="persona"></span><div class="divider"></div>`
          + `<div class="chip"><img class="logo" alt="" /><span class="winner"></span></div>`
          + `<div class="glow"></div>`;
        row.querySelector('.persona').textContent = b.persona || '';
        row.querySelector('.winner').textContent = b.winner || '';
        const logoEl = row.querySelector('.logo');
        if (b.logo && LOGOS[b.logo]) {
          logoEl.src = LOGOS[b.logo];
          logoEl.style.display = 'block';
        } else {
          logoEl.remove();
        }
        rowsContainer.appendChild(row);
        els.push({ b, row });
      });

      /* ===== TIMELINE (LOCKED) ===== */
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const firstAt = DATA.beats.length ? Math.max(0, Math.min(...DATA.beats.map(b => Number(b.at))) - 0.3) : 0.3;
      tl.from('#eyebrow', { opacity: 0, y: 14, duration: 0.45, ease: 'power2.out' }, Math.max(0, firstAt - 0.15));
      tl.from('#title', { opacity: 0, y: 24, duration: 0.6, ease: 'power3.out' }, firstAt);
      els.forEach(({ b, row }) => {
        const at = Number(b.at);
        tl.from(row, { opacity: 0, y: 26, duration: 0.5, ease: 'power3.out' }, at);
        tl.from(row.querySelector('.divider'), { scaleX: 0, duration: 0.45, ease: 'power2.out' }, at + 0.12);
        tl.from(row.querySelector('.chip'), { opacity: 0, scale: 0.85, x: 24, duration: 0.5, ease: 'back.out(1.8)' }, at + 0.18);
        tl.fromTo(row.querySelector('.glow'), { opacity: 1 }, { opacity: 0, duration: 0.8, ease: 'power2.out' }, at + 0.25);
      });
      window.__timelines['personamatch'] = tl;
    </script>
  </body>
</html>
