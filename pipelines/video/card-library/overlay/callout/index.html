<!doctype html>
<!--
  CALLOUT BOX   (Hyperframes OVERLAY — transparent background)
  A "Pro tip / Warning / Note" box pops in (default top-right) and holds. Sits on
  top of your screen recording. 1920x1080, 30fps, 5 seconds.

  ⚠ OVERLAY: render as a TRANSPARENT WebM:
    npx hyperframes@latest render overlay/callout -o callout.webm --format webm --fps 30
  EDITOR: edit only ===== CONTENT ===== (kind: tip|warning|note, title, text, pos) + :root.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --tip: #34d399; --warning: #fb923c; --note: #38bdf8;
        --panel: rgba(15, 11, 7, 0.86); --text: #ffffff; --text-dim: rgba(255,239,219,0.78);
        --font: 'Inter', system-ui, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; font-family: var(--font); color: var(--text); }
      #root { position: relative; width: 1920px; height: 1080px; }
      /* position presets via #root[data-pos] */
      #box { position: absolute; width: 620px; max-width: 620px; }
      #root[data-pos="top-right"] #box { top: 110px; right: 110px; }
      #root[data-pos="top-left"] #box { top: 110px; left: 110px; }
      #root[data-pos="bottom-right"] #box { bottom: 110px; right: 110px; }
      #root[data-pos="center"] #box { top: 50%; left: 50%; transform: translate(-50%,-50%); }
      .panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.12); border-left: 6px solid var(--accent); border-radius: 18px; padding: 30px 34px; backdrop-filter: blur(14px); }
      .kicker { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 8px; }
      .head { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
      .ic { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; background: color-mix(in srgb, var(--accent) 18%, transparent); color: var(--accent); }
      .title { font-size: 32px; font-weight: 800; color: var(--accent); letter-spacing: 0.5px; }
      .text { font-size: 27px; line-height: 1.45; color: var(--text-dim); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="callout" data-start="0" data-duration="5" data-width="1920" data-height="1080" data-pos="top-right"
      data-composition-variables='{"kind":"tip","title":"Pro tip","text":"Pin your n8n version in the Docker tag so updates never break your flows.","pos":"top-right"}'>
      <div id="box" class="clip" data-start="0" data-duration="5" data-track-index="0">
        <div class="panel" id="panel">
          <div class="kicker" id="kicker" style="display: none;"></div>
          <div class="head"><span class="ic" id="ic">!</span><span class="title" id="title"></span></div>
          <div class="text" id="text"></div>
        </div>
      </div>
    </div>

    <script>
      /* ===== CONTENT ===== */
      const VARS = (window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : null) || {};
      const DATA = {
        kind: VARS.kind ?? 'tip', // tip | warning | note
        title: VARS.title ?? 'Pro tip',
        text: VARS.text ?? 'Pin your n8n version in the Docker tag so updates never break your flows.',
        pos: VARS.pos ?? 'top-right', // top-right | top-left | bottom-right | center
        style: VARS.style, // optional: feature | tip | warning
        kicker: VARS.kicker, // optional
      };
      const ICONS = { tip: '💡', warning: '⚠', note: 'i' };
      const root = document.getElementById('root');
      root.dataset.pos = DATA.pos;
      
      let accentVar = `var(--${DATA.kind})`;
      if (DATA.style === 'feature') accentVar = '#fb923c';
      else if (DATA.style === 'tip') accentVar = '#34d399';
      else if (DATA.style === 'warning') accentVar = '#fb7185';
      root.style.setProperty('--accent', accentVar);

      document.getElementById('ic').textContent = ICONS[DATA.kind] || '!';
      document.getElementById('title').textContent = DATA.title;
      document.getElementById('text').textContent = DATA.text;
      if (DATA.kicker) {
        const k = document.getElementById('kicker');
        k.textContent = DATA.kicker;
        k.style.display = 'block';
      }

      /* ===== TIMELINE (LOCKED) ===== */
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from('#box', { opacity: 0, scale: 0.85, y: 16, duration: 0.55, ease: 'back.out(1.6)' }, 0.1);
      tl.from('.text', { opacity: 0, duration: 0.4, ease: 'none' }, 0.4);
      window.__timelines['callout'] = tl;
    </script>
  </body>
</html>
